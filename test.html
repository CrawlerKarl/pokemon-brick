<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Wavebreaker — invariant tests</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #05060f; color: #cfd8ea; font: 13px/1.5 Menlo, Consolas, monospace; }
  body { overflow: auto; }
  /* the game canvas must exist for the engine, but the report owns the page */
  #game { position: fixed; top: 0; left: 0; z-index: 0; opacity: 0.14; pointer-events: none; }
  #safe-probe { position: fixed; bottom: 0; height: env(safe-area-inset-bottom, 0px); width: 1px; visibility: hidden; }
  #report { position: relative; z-index: 1; max-width: 980px; margin: 0 auto; padding: 22px 18px 60px; }
  h1 { font-size: 16px; color: #8ab4ff; margin-bottom: 4px; }
  #summary { font-size: 20px; font-weight: bold; margin: 10px 0 16px; color: #ffd54f; }
  #summary.pass { color: #66bb6a; }
  #summary.fail { color: #ff5252; }
  table { border-collapse: collapse; width: 100%; background: rgba(10, 14, 30, 0.92); }
  th, td { border: 1px solid #1d2942; padding: 6px 9px; text-align: left; vertical-align: top; }
  th { color: #8ab4ff; background: #0b1020; }
  td.status { font-weight: bold; white-space: nowrap; }
  tr.PASS td.status { color: #66bb6a; }
  tr.FAIL td.status { color: #ff5252; }
  tr.SKIP td.status { color: #ffb74d; }
  tr.RUN  td.status { color: #8ab4ff; }
  td.ms { text-align: right; white-space: nowrap; color: #7c8db0; }
  td.detail { word-break: break-word; color: #aab6cf; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="safe-probe"></div>
<div id="report">
  <h1>Wavebreaker — in-browser invariant suite</h1>
  <div id="summary">loading game scripts…</div>
  <table>
    <thead><tr><th>test</th><th>status</th><th>ms</th><th>detail</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script>
'use strict';
// ---- pre-game shims (MUST run before the game scripts load) ----
// 1) capture every uncaught error / rejection so tests can assert "no exception"
window.__ERRORS = [];
window.addEventListener('error', e => {
  window.__ERRORS.push((e.message || 'error') + ' @ ' + (e.filename || '?') + ':' + (e.lineno || 0));
});
window.addEventListener('unhandledrejection', e => {
  window.__ERRORS.push('unhandledrejection: ' + (e.reason && e.reason.message || e.reason));
});
// 2) swallow the game's requestAnimationFrame loop — the suite drives update()
//    manually, exactly like the console-driven sim in CLAUDE.md, so backgrounded
//    rAF throttling can never starve the tests.
window.__realRAF = window.requestAnimationFrame.bind(window);
window.requestAnimationFrame = function () { return 0; };
</script>

<!-- same scripts, same order as index.html -->
<script src="js/setup.js"></script>
<script src="js/config.js"></script>
<script src="js/audio.js"></script>
<script src="js/data.js"></script>
<script src="js/scenery.js"></script>
<script src="js/state.js"></script>
<script src="js/input.js"></script>
<script src="js/update.js"></script>
<script src="js/render.js"></script>
<script src="js/main.js"></script>

<script>
'use strict';
/* eslint-disable no-undef */
(function () {
  const ERR = window.__ERRORS;
  const RESULTS = [];
  const rowsEl = document.getElementById('rows');
  const summaryEl = document.getElementById('summary');
  const tick = () => new Promise(r => setTimeout(r, 0));

  function addRow(name) {
    const tr = document.createElement('tr');
    tr.className = 'RUN';
    tr.innerHTML = '<td></td><td class="status">RUN…</td><td class="ms"></td><td class="detail"></td>';
    tr.children[0].textContent = name;
    rowsEl.appendChild(tr);
    return tr;
  }
  function finishRow(tr, status, ms, detail) {
    tr.className = status;
    tr.children[1].textContent = status;
    tr.children[2].textContent = String(Math.round(ms));
    tr.children[3].textContent = detail || '';
  }

  // assertion helper: throws to fail the enclosing test
  function assert(cond, msg) { if (!cond) throw new Error(msg); }
  class Skip extends Error {}

  // Some headless/embedded browsers lay the page out at 0×0, which makes
  // resize() bail and leaves every geometry degenerate. If the real viewport
  // is unusable, force a fixed virtual one — deterministic for automation.
  let FORCED_VIEWPORT = false;
  function forceViewport(w, h) {
    FORCED_VIEWPORT = true;
    DPR = 1; W = w; H = h; SAFE_B = 0;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    canvas.width = W; canvas.height = H;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    buildStars(); buildVignette(); bgGen = -1;
    G.paddle.x = W / 2;
  }
  function ensureViewport() {
    resize();
    if (W < 100 || H < 100) forceViewport(900, 700);
  }

  // ---- shared sim helpers -------------------------------------------------
  // the proven headless-driving pattern: force-run each frame, steer, update
  async function runFrames(n, perFrame) {
    for (let f = 0; f < n; f++) {
      paused = false; G.freeze = 0;
      if (perFrame && perFrame(f) === false) return f;
      update(1 / 60);
      if ((f & 511) === 511) await tick(); // stay responsive on long runs
    }
    return n;
  }
  function nanScan() {
    const bad = [];
    for (const b of G.balls) {
      if (!Number.isFinite(b.x) || !Number.isFinite(b.y) || !Number.isFinite(b.vx) || !Number.isFinite(b.vy)) {
        bad.push('ball(' + b.x + ',' + b.y + ' v ' + b.vx + ',' + b.vy + ')');
      }
    }
    for (const br of G.bricks) {
      if (!Number.isFinite(br.bx) || !Number.isFinite(br.by) || !Number.isFinite(br.hx) || !Number.isFinite(br.hy)) {
        bad.push('brick#' + (br.poke && br.poke.id) + '(' + br.bx + ',' + br.by + ')');
      }
    }
    if (!Number.isFinite(G.paddle.x)) bad.push('paddle.x=' + G.paddle.x);
    return bad;
  }
  function aliveBricks() { return G.bricks.filter(b => !b.dead).length; }
  function steerBallOrAim(mode) {
    if (mode === 'classic') {
      const b = G.balls.find(bb => !bb.dead);
      mouseX = b ? b.x : W / 2;
    } else {
      // aim the blaster: park under the nearest living target so fire connects
      let tgt = null, td = Infinity;
      for (const br of G.bricks) {
        if (br.dead) continue;
        const d = Math.abs(br.bx + G.fx - G.paddle.x);
        if (d < td) { td = d; tgt = br; }
      }
      mouseX = tgt ? Math.max(20, Math.min(W - 20, tgt.bx + G.fx)) : W / 2;
      lastMouseY = H - 40; // junkie: keep the ship low in its band
    }
  }
  function resetBetween() {
    try {
      fireHeld = false; chargeHeld = false; trialOpen = false; advOpen = false; upgradeTreeOpen = false;
      dragSlider = -1; settingsPage = 0;
      SETTINGS.mode = 'classic'; SETTINGS.autoFire = false;
      resetRun(1, true);
      G.state = 'menu';
      paused = false; G.freeze = 0;
      mouseX = W / 2; lastMouseY = H / 2;
    } catch (e) { ERR.push('between-test reset failed: ' + e.message); }
  }

  // ---- the tests ----------------------------------------------------------
  const TESTS = [];
  function test(name, fn) { TESTS.push({ name, fn }); }

  // 1) startup: scripts loaded, one resize + update + render, no errors, menu state
  test('startup', async () => {
    ensureViewport();
    paused = false; G.freeze = 0;
    update(1 / 60);
    render();
    assert(G.state === 'menu', "G.state is '" + G.state + "', expected 'menu'");
    assert(ERR.length === 0, 'errors during load/startup: ' + ERR.join(' | '));
    return 'scripts loaded, resize+update+render clean, W×H=' + W + '×' + H +
      (FORCED_VIEWPORT ? ' (viewport reported 0×0 — forced virtual 900×700)' : '');
  });

  // 1b) every pilot attack shape renders at every evolution tier — a tier-III
  // fire pilot once CRASHED here (negative ember radius throws in ctx.arc)
  test('typed bolts render at all tiers', async () => {
    ensureViewport();
    const shapes = ['flame', 'draco', 'fist', 'aqua', 'shard', 'gear', 'leaf', 'sting',
      'venom', 'quake', 'gale', 'pixel', 'psy', 'star', 'wisp', 'claw', 'volt', null];
    const elements = ['fire', 'water', 'grass', 'electric', 'psychic', 'dark'];
    let drawn = 0;
    for (const shape of shapes) {
      for (let tier = 1; tier <= 3; tier++) {
        for (let k = 0; k < 4; k++) { // several phases so time-varying maths runs
          G.time = k * 0.61;
          drawTypedBolt({ x: 120 + k * 40, y: 200, shape, element: elements[k % elements.length], tier });
          drawn++;
        }
      }
    }
    assert(ERR.length === 0, 'typed-bolt rendering threw: ' + ERR.join(' | '));
    return shapes.length + ' shapes × 3 tiers rendered clean (' + drawn + ' draws)';
  });

  // 1c) THE NINEFOLD DAWN: stage 27 must END a real campaign (never silently
  // build stage 28), record completion durably, keep the checkpoint, and
  // offer TIME SPIRAL as the explicit New Game+ path. Trials keep the loop.
  test('campaign completion branch', async () => {
    const priorVictory = localStorage.getItem('pkbrk-victory');
    const priorCkpt = localStorage.getItem('pkbrk-run');
    try {
      SETTINGS.mode = 'junkie';
      resetRun(27);
      G.trial = false; G.lives = 99;
      let guard = 0;
      while (G.state === 'play' && guard++ < 4000) {
        paused = false; G.freeze = 0;
        for (const b of G.bricks) if (!b.dead && !b.dormant && !b.barrier) damageBrick(b, 9999, b.bx + G.fx, b.by + G.fy);
        update(1 / 60);
      }
      assert(G.state === 'ending', "stage 27 clear entered '" + G.state + "', expected 'ending'");
      assert(G.level === 27, 'level incremented to ' + G.level + ' — the campaign must not loop uninvited');
      const rec = JSON.parse(localStorage.getItem('pkbrk-victory') || '{}');
      assert(rec && rec.everSeen && rec['junkie:' + SETTINGS.preset], 'completion record missing after the clear');
      assert(localStorage.getItem('pkbrk-run') === priorCkpt, 'the safe checkpoint was erased by the ending');
      // the ending renders through every beat without exceptions
      const e0 = ERR.length;
      for (let f = 0; f < 60 * 36; f++) { update(1 / 60); if (f % 120 === 0) render(); }
      assert(G.ending && G.ending.done, 'ending never reached its completion beat');
      render();
      assert(ERR.length === e0, 'ending render threw: ' + ERR.slice(e0).join(' | '));
      // TIME SPIRAL is the explicit continuation into the old level-28 loop
      beginTimeSpiral();
      assert(G.level === 28 && G.state === 'upgrade' && G.upgradeChoices,
        'TIME SPIRAL did not open the level-28 draft');
      // trials keep their existing flow: clearing 27 in a trial still loops
      resetRun(27, true);
      G.lives = 99; guard = 0;
      while (G.state === 'play' && guard++ < 4000) {
        paused = false; G.freeze = 0;
        for (const b of G.bricks) if (!b.dead && !b.dormant && !b.barrier) damageBrick(b, 9999, b.bx + G.fx, b.by + G.fy);
        update(1 / 60);
      }
      assert(G.state === 'upgrade' && G.level === 28, 'trial stage 27 should keep the classic loop');
      return 'stage 27 → ending (level stays 27) · record saved · checkpoint kept · 36s of beats render clean · TIME SPIRAL → 28 · trial loops';
    } finally {
      if (priorVictory == null) localStorage.removeItem('pkbrk-victory'); else localStorage.setItem('pkbrk-victory', priorVictory);
      if (priorCkpt == null) localStorage.removeItem('pkbrk-run'); else localStorage.setItem('pkbrk-run', priorCkpt);
      G.ending = null;
      resetBetween();
    }
  });

  // 2) mode smoke ×3
  async function modeSmoke(mode, frames) {
    const e0 = ERR.length;
    SETTINGS.mode = mode;
    resetRun(1, true);
    G.lives = 99; // smoke test: survive shots — we're testing sim health, not skill
    if (mode !== 'classic') fireHeld = true;
    const startBricks = G.bricks.length;
    let reachedUpgrade = false;
    await runFrames(frames, () => {
      if (G.state === 'upgrade') { reachedUpgrade = true; return false; }
      if (G.state === 'serve') fireAction();
      if (mode === 'classic' && G.state === 'play') fireHeld = true; // classic = ball + free-firing blaster
      steerBallOrAim(mode);
    });
    fireHeld = false;
    const nans = nanScan();
    assert(nans.length === 0, 'NaN positions: ' + nans.join(', '));
    assert(ERR.length === e0, 'errors during sim: ' + ERR.slice(e0).join(' | '));
    // real damage happened under AI control (bricks were destroyed)
    assert(reachedUpgrade || aliveBricks() < startBricks,
      'no bricks destroyed in ' + frames + ' frames (alive=' + aliveBricks() + '/' + startBricks + ')');
    // Deterministically FINISH the wave so the upgrade/draft flow is always
    // exercised — a dumb AI sinking the literal last flyer was flaky. Killing
    // the bricks routes through the same level-clear code the game uses.
    if (!reachedUpgrade) {
      if (G.state === 'serve') fireAction();
      G.reinforce = 0;
      for (const b of G.bricks) b.dead = true;
      await runFrames(400, () => G.state === 'upgrade' ? false : undefined);
    }
    // the upgrade draft must be usable
    assert(G.state === 'upgrade', "expected 'upgrade' state, got '" + G.state + "'");
    assert(G.upgradeChoices && G.upgradeChoices.length > 0, 'no upgrade choices offered');
    pickUpgrade(0);
    assert(G.upgradeChoices === null, 'pickUpgrade(0) did not consume the draft');
    assert(G.state === 'serve' || G.state === 'play',
      "pickUpgrade(0) left state '" + G.state + "', expected serve/play");
    assert(ERR.length === e0, 'errors during pickUpgrade: ' + ERR.slice(e0).join(' | '));
    return (reachedUpgrade ? 'AI-cleared' : 'AI-progressed, finished') + ', pickUpgrade(0) OK → ' + G.state;
  }
  test('mode smoke: classic', () => modeSmoke('classic', 4000));
  test('mode smoke: blaster', () => modeSmoke('blaster', 3000));
  test('mode smoke: junkie', () => modeSmoke('junkie', 3000));

  test('upgrade tree: six balanced paths + two weapon identities', async () => {
    assert(PATH_KEYS.length === 6, 'expected 6 paths, got ' + PATH_KEYS.length);
    assert(PATH_KEYS.filter(k => PATHS[k].family === 'offense').length === 2,
      'expected exactly 2 offense paths');
    assert(PATH_KEYS.every(k => PATHS[k].tiers.length === 4), 'every path must have exactly 4 tiers');
    assert(PATH_KEYS.every(k => PATHS[k].tiers.every(t => t.visual)),
      'every upgrade tier must declare its persistent visual tell');
    SETTINGS.mode = 'blaster';
    resetRun(1, true);
    rollUpgradeChoices();
    assert(G.upgradeChoices.length === 3, 'fresh draft did not contain 3 choices');
    assert(G.upgradeChoices.some(c => c.path && c.path.family === 'offense'), 'draft omitted offense');
    assert(G.upgradeChoices.some(c => c.path && c.path.family !== 'offense'), 'draft omitted non-offense');
    for (const pk of ['arsenal', 'impact']) while (pathLvl(pk) < 4) advancePath(pk);
    G.state = 'play'; G.blasterCD = 0; G.shotsFired = 3; G.lasers = [];
    fireAction(); // fourth volley: Twin + Nova Round + Hyper Cycle
    assert(G.lasers.length === 2, 'Twin Cannon should create 2 bolts, got ' + G.lasers.length);
    assert(G.lasers.every(l => l.powerMul === 0.6), 'Twin bolts must each deal 60% base damage');
    assert(G.lasers.every(l => l.pulse && l.nova), 'fourth capped Impact volley was not a Nova pulse');
    assert(G.lasers.every(l => !l.hyper), 'old always-on Hyper pierce flag returned');
    assert(Math.abs(G.blasterCD - 0.24) < 0.0001, 'Hyper Cycle cadence is not 20% faster');
    return '6×4 tree; every tier has a visual tell; fair draft; Twin=2×60%; Nova every 4th; Hyper Cycle=−20% cooldown';
  });

  // 2w) THE UPGRADE WEB — graph integrity: adjacency, pair coverage, unique
  // keys, complete copy/visual contracts, and every eligibility gate.
  test('upgrade web: graph integrity + eligibility gates', async () => {
    assert(WEB_SPOKE_ORDER.length === 6 && PATH_KEYS.every(k => WEB_SPOKE_ORDER.includes(k)),
      'WEB_SPOKE_ORDER must be a permutation of PATH_KEYS');
    assert(WEB_BRIDGES.length === 6 && WEB_FUSIONS.length === 15 && WEB_APEXES.length === 2 &&
      WEB_SATELLITES.length === 3, 'expected 6 bridges, 15 fusions, 2 apexes, 3 satellites');
    const spokeIdx = k => WEB_SPOKE_ORDER.indexOf(k);
    for (const b of WEB_BRIDGES) {
      const d = Math.abs(spokeIdx(b.paths[0]) - spokeIdx(b.paths[1]));
      assert(d === 1 || d === 5, 'bridge ' + b.key + ' does not connect adjacent wedges');
      assert(b.name && b.icon && b.desc && b.visual && b.proc,
        'bridge ' + b.key + ' is missing copy/visual contract fields');
    }
    for (const pk of PATH_KEYS) {
      assert(WEB_BRIDGES.filter(b => b.paths.includes(pk)).length === 2,
        pk + ' must touch exactly 2 bridges');
    }
    // FUSIONS cover every unordered path pair EXACTLY once; the six adjacent
    // pairs carry their bridge, the nine cross-web pairs carry none
    const pairSeen = new Set();
    for (const f of WEB_FUSIONS) {
      const pair = f.paths.slice().sort().join('+');
      assert(!pairSeen.has(pair), 'duplicate fusion pair ' + pair);
      pairSeen.add(pair);
      const d = Math.abs(spokeIdx(f.paths[0]) - spokeIdx(f.paths[1]));
      const adjacent = d === 1 || d === 5;
      assert(adjacent === !!f.bridge, f.key + ': bridge presence must match wedge adjacency');
      if (f.bridge) {
        const br = webBridge(f.bridge);
        assert(br && br.paths.slice().sort().join('+') === pair, f.key + ' rides the wrong bridge');
      }
      assert(f.name && f.icon && f.color && f.desc && f.visual && f.proc && f.ready && f.role && f.limit,
        'fusion ' + f.key + ' is missing copy/visual/limiter contract fields');
    }
    assert(pairSeen.size === 15, 'the 15 fusions must cover all C(6,2) path pairs');
    for (const x of WEB_APEXES) {
      assert(x.paths.length === 3 && apexCompatFusions(x).length === 3,
        'apex ' + x.key + ' needs exactly three in-set fusions to choose from');
      assert(x.name && x.icon && x.color && x.desc && x.visual && x.proc && x.ready && x.role && x.limit,
        'apex ' + x.key + ' is missing contract fields');
      assert(x.mapSlot != null, 'apex ' + x.key + ' needs a map slot');
    }
    for (const sat of WEB_SATELLITES) {
      assert(stackItem(sat.stackKey) && PATHS[sat.path], 'satellite ' + sat.stackKey + ' has bad references');
    }
    const allKeys = [
      ...PATH_KEYS.flatMap(k => PATHS[k].tiers.map(t => t.key)),
      ...WEB_BRIDGE_KEYS, ...WEB_FUSION_KEYS, ...WEB_APEX_KEYS,
      ...STACK_ITEMS.map(s => s.key), ...SECRET_UPGRADES.map(s => s.key),
    ];
    assert(new Set(allKeys).size === allKeys.length, 'duplicate upgrade keys across the web');
    // eligibility walk: every FUSION reachable via Form III + 3/3 ranks +
    // either-side capstone (+ bridge when adjacent); the 2-slot cap bites
    SETTINGS.mode = 'blaster';
    resetRun(1, true);
    assert(WEB_BRIDGES.every(b => !bridgeEligible(b)), 'a bridge was eligible at Form I with no nodes');
    for (const f of WEB_FUSIONS) {
      G.path = {}; G.upg = {}; G.starterLvl = 3;
      advancePath(f.paths[0]); advancePath(f.paths[0]); advancePath(f.paths[0]);
      advancePath(f.paths[1]); advancePath(f.paths[1]); advancePath(f.paths[1]);
      assert(!fusionEligible(f), f.key + ' eligible at 3/3 without a capstone');
      advancePath(f.paths[0]); // capstone one side
      if (f.bridge) {
        assert(!fusionEligible(f), f.key + ' eligible without its bridge');
        G.upg[f.bridge] = 1;
      }
      assert(fusionEligible(f), f.key + ' not eligible with its full recipe');
      G.starterLvl = 2;
      assert(!fusionEligible(f), f.key + ' eligible before Final Form');
      G.starterLvl = 3;
      // the TWO-SLOT cap: with two other fusions owned it goes dark
      const others = WEB_FUSION_KEYS.filter(k => k !== f.key).slice(0, 2);
      for (const k of others) G.upg[k] = 1;
      assert(!fusionEligible(f), f.key + ' ignored the 2-fusion slot cap');
      assert(webLockReason(f, 'fusion').some(r => /SLOTS FULL/.test(r)),
        f.key + ' does not explain the full slots');
    }
    // APEX gates: stage 24+, two compatible fusions, nine ranks, one slot
    for (const x of WEB_APEXES) {
      G.path = {}; G.upg = {}; G.starterLvl = 3; G.level = 23;
      for (const pk of x.paths) { advancePath(pk); advancePath(pk); advancePath(pk); }
      const compat = apexCompatFusions(x);
      G.upg[compat[0].key] = 1; G.upg[compat[1].key] = 1;
      assert(!apexEligible(x), x.key + ' eligible before stage 24');
      G.level = 24;
      assert(apexEligible(x), x.key + ' not eligible with its full recipe at stage 24');
      G.path[x.paths[0]] = 2; // drop below nine ranks
      assert(!apexEligible(x), x.key + ' ignored the nine-rank floor');
      G.path[x.paths[0]] = 3;
      G.upg[WEB_APEXES.find(o => o.key !== x.key).key] = 1; // other apex owned
      assert(!apexEligible(x), x.key + ' ignored the 1-apex slot cap');
    }
    G.level = 1; G.starterLvl = 1; G.path = {}; G.upg = {};
    const reasons = webLockReason(WEB_FUSIONS[0], 'fusion');
    assert(reasons.length >= 3, 'a fully locked fusion should list its unmet requirements, got ' + reasons.length);
    return '15 fusions cover all pairs · 2 apexes gated · slot caps + lock reasons correct';
  });

  // 2w-i) OFFER ALGORITHM invariants: legal hands under fuzz, superskill
  // priority, post-evolution guarantee, reroll anti-repeat, satellites last.
  test('upgrade web: offer algorithm invariants', async () => {
    const e0 = ERR.length;
    SETTINGS.mode = 'junkie';
    resetRun(1, true);
    const freshWeb = form => {
      G.path = {}; G.upg = {}; G.webSeen = {}; G.lastOfferKeys = []; G.rerolled = false;
      G.starterLvl = form; G.lastDraftForm = form;
    };
    // fuzz 60 random builds — every dealt hand must be legal
    for (let iter = 0; iter < 60; iter++) {
      freshWeb(1 + Math.floor(Math.random() * 3));
      const n = Math.floor(Math.random() * 22);
      for (let i = 0; i < n; i++) {
        const opts = [
          ...PATH_KEYS.filter(k => pathLvl(k) < 4).map(k => () => advancePath(k)),
          ...WEB_BRIDGES.filter(bridgeEligible).map(b => () => { G.upg[b.key] = 1; }),
          ...WEB_FUSIONS.filter(fusionEligible).map(f => () => { G.upg[f.key] = 1; }),
          ...WEB_APEXES.filter(apexEligible).map(x => () => { G.upg[x.key] = 1; }),
        ];
        if (!opts.length) break;
        opts[Math.floor(Math.random() * opts.length)]();
      }
      G.lives = 1 + Math.floor(Math.random() * 4); G.livesMax = Math.max(G.lives, 4);
      rollUpgradeChoices();
      const cs = G.upgradeChoices || [];
      assert(cs.length === 3, 'iter ' + iter + ': hand size ' + cs.length);
      const authoredEligible = PATH_KEYS.filter(k => pathLvl(k) < 4).length +
        WEB_BRIDGES.filter(bridgeEligible).length + WEB_FUSIONS.filter(fusionEligible).length +
        WEB_APEXES.filter(apexEligible).length;
      for (const c of cs) {
        if (c.pathKey) {
          assert(pathLvl(c.pathKey) < 4 && c.tierIdx === pathLvl(c.pathKey),
            'iter ' + iter + ': illegal continuation ' + c.pathKey + '@' + c.tierIdx);
        } else if (c.web) {
          assert(c.webKind === 'apex' ? apexEligible(c.web)
            : c.webKind === 'fusion' ? fusionEligible(c.web) : bridgeEligible(c.web),
            'iter ' + iter + ': ineligible web node ' + c.web.key + ' offered');
        } else assert(c.stack, 'iter ' + iter + ': unknown choice shape');
      }
      { // the plan's one-per-hand rule: never two fusions/apexes together
        const bigs = cs.filter(c => c.web && (c.webKind === 'fusion' || c.webKind === 'apex')).length;
        assert(bigs <= 1, 'iter ' + iter + ': ' + bigs + ' fusions/apexes in one hand');
      }
      const pks = cs.filter(c => c.pathKey).map(c => c.pathKey);
      assert(new Set(pks).size === pks.length, 'iter ' + iter + ': duplicate path in hand');
      const nStacks = cs.filter(c => c.stack).length;
      assert(3 - nStacks === Math.min(3, authoredEligible),
        'iter ' + iter + ': a satellite crowded out an authored node (' + nStacks + ' stacks, ' + authoredEligible + ' eligible)');
    }
    // fusion priority: an eligible fusion always takes the Explore slot
    freshWeb(3);
    for (const pk of ['arsenal', 'impact']) while (pathLvl(pk) < 4) advancePath(pk);
    G.upg.calibrated = 1;
    rollUpgradeChoices();
    assert(G.upgradeChoices.some(c => c.web && c.web.key === 'meteor'),
      'an eligible fusion was not offered');
    // once TWO fusions are installed, no further fusion is ever dealt
    G.upg.meteor = 1; G.upg.prismstorm = 1;
    for (const pk of PATH_KEYS) while (pathLvl(pk) < 4) advancePath(pk);
    for (const b of WEB_BRIDGE_KEYS) G.upg[b] = 1;
    rollUpgradeChoices();
    assert(!G.upgradeChoices.some(c => c.web && c.webKind === 'fusion'),
      'a fusion was offered past the 2-slot cap');
    // post-evolution guarantee: reaching Form II surfaces a newly unlocked bridge
    freshWeb(1);
    advancePath('arsenal'); advancePath('impact');
    G.starterLvl = 2; // evolution happened since the last draft
    rollUpgradeChoices();
    assert(G.upgradeChoices.some(c => c.web && c.webKind === 'bridge'),
      'the first post-evolution draft did not surface a bridge');
    // reroll anti-repeat: a fresh-run reroll re-deals at most the one node the
    // offense/non-offense guard can force back
    freshWeb(1);
    rollUpgradeChoices();
    const first = (G.upgradeChoices || []).map(c => c.pathKey).filter(Boolean);
    G.rerolled = true;
    rollUpgradeChoices();
    const second = (G.upgradeChoices || []).map(c => c.pathKey).filter(Boolean);
    const overlap = first.filter(k => second.includes(k));
    assert(overlap.length <= 1, 'reroll re-dealt ' + overlap.length + ' of the rejected hand (' + overlap.join(',') + ')');
    // low health forces a legal rescue option
    freshWeb(1);
    G.lives = 1; G.livesMax = 5;
    rollUpgradeChoices();
    assert(G.upgradeChoices.some(c => c.path && ['defense', 'utility'].includes(c.path.family)),
      'low health did not force a defense/utility offer');
    // exhausted web: hand becomes exactly the three mastery satellites
    freshWeb(3);
    for (const pk of PATH_KEYS) while (pathLvl(pk) < 4) advancePath(pk);
    for (const k of WEB_BRIDGE_KEYS) G.upg[k] = 1;

    rollUpgradeChoices();

    assert(ERR.length === e0, 'errors during offer tests: ' + ERR.slice(e0).join(' | '));
    return '60 fuzzed hands legal · fusion priority + slot caps · evolution guarantee · reroll fresh · rescue forced · satellites last';
  });

  // 2w-iie) SEEDED ACQUISITION: the plan's structural pacing targets — a
  // focused route earns its fusion by Galar ≥80% of the time, caps hold,
  // and no apex ever lands before stage 24.
  test('upgrade web: seeded acquisition rates + caps', async () => {
    SETTINGS.mode = 'junkie'; SETTINGS.starter = 'none';
    resetRun(1, true);
    const runDraft = strategy => {
      G.path = {}; G.upg = {}; G.stacks = { orb: 0, ice: 0, bell: 0 };
      G.webSeen = {}; G.lastOfferKeys = []; G.rerolled = false;
      G.lives = 4; G.livesMax = 4;
      const out = { fusionAt: null, fusions: 0, apexAt: null };
      for (let lvl = 1; lvl <= 27; lvl++) {
        G.level = lvl + 1; // drafting happens after the clear, at the next stage's doorstep
        G.starterLvl = starterStage(G.level, null);
        rollUpgradeChoices();
        const cs = G.upgradeChoices || [];
        const pick = strategy(cs) || cs[0];
        if (!pick) break;
        if (pick.pathKey) advancePath(pick.pathKey);
        else if (pick.web) {
          G.upg[pick.web.key] = 1;
          if (pick.webKind === 'fusion') { out.fusions++; if (!out.fusionAt) out.fusionAt = G.level; }
          if (pick.webKind === 'apex') out.apexAt = G.level;
        } else if (pick.stack) G.stacks[pick.stack.key]++;
        G.lastDraftForm = webForm();
      }
      return out;
    };
    const focused = cs =>
      cs.find(c => c.web && c.webKind === 'apex')
      || cs.find(c => c.web && c.webKind === 'fusion')
      || cs.find(c => c.web && c.webKind === 'bridge' && c.web.key === 'calibrated')
      || cs.find(c => c.pathKey === 'arsenal') || cs.find(c => c.pathKey === 'impact')
      || cs.find(c => c.pathKey === 'surge') || cs.find(c => c.pathKey);
    const casual = cs => cs[Math.floor(Math.random() * cs.length)];
    let focusedHit = 0, focusedSum = 0, apexCount = 0, capViol = 0, earlyApex = 0;
    for (let i = 0; i < 40; i++) {
      const r = runDraft(focused);
      if (r.fusionAt) { focusedSum += r.fusionAt; if (r.fusionAt <= 24) focusedHit++; }
      if (r.fusions > 2) capViol++;
      if (r.apexAt) { apexCount++; if (r.apexAt < 24) earlyApex++; }
    }
    assert(capViol === 0, 'a run exceeded the 2-fusion cap');
    assert(earlyApex === 0, 'an apex landed before stage 24');
    assert(focusedHit >= 32, 'focused fusion-by-Galar rate ' + focusedHit + '/40 < 80%');
    // a full 27-pick journey usually completes SOME recipe eventually — the
    // pacing target is that unfocused discovery lands notably LATER than a
    // focused chase, and the 2-slot cap bounds everyone equally
    let casualHit = 0, casualSum = 0;
    for (let i = 0; i < 40; i++) {
      const r = runDraft(casual);
      if (r.fusions > 2) capViol++;
      if (r.fusionAt) { casualHit++; casualSum += r.fusionAt; }
    }
    assert(capViol === 0, 'a casual run exceeded the 2-fusion cap');
    assert(casualHit >= 8, 'unfocused runs never discover fusions: ' + casualHit + '/40');
    const focusedAvg = focusedSum / Math.max(1, focusedHit), casualAvg = casualSum / Math.max(1, casualHit);
    assert(casualAvg > focusedAvg + 0.5,
      'unfocused discovery should land later than a focused chase (focused ' +
      focusedAvg.toFixed(1) + ' vs casual ' + casualAvg.toFixed(1) + ')');
    assert(apexCount >= 1, 'a strongly focused route never completed an apex in 40 journeys');
    return 'focused fusion≤Galar ' + focusedHit + '/40 @~' + focusedAvg.toFixed(1) +
      ' · casual ' + casualHit + '/40 @~' + casualAvg.toFixed(1) + ' · apexes ' +
      apexCount + '/40 (never pre-24) · caps hold';
  });

  // 2w-iii) checkpoint migration: v1/v2 accepted, normalized v3 out, lossless

      stacks: { orb: 2, ice: 0, bell: 1 },

      secretUpg: { heart: true, lens: false, echo: false },

    };
    const m = migrateCheckpoint(v2);
    assert(m && m.v === 3, 'v2 did not migrate to v3');
    assert(m.lvl === 13 && m.score === 51234 && m.lives === 3 && m.livesMax === 5 &&
      m.mode === 'junkie' && m.starter === 'fire' && m.starterLvl === 2 && m.preset === 'normal',
      'v2 scalar state was not preserved');
    for (const [k, n] of Object.entries(v2.path)) assert(m.path[k] === n, 'path ' + k + ' lost in migration');
    // the 24 owned tiers land on exactly the right anchor nodes
    for (const pk of PATH_KEYS) for (let t = 0; t < 4; t++) {
      const want = t < v2.path[pk] ? 1 : undefined;
      assert(m.upg[PATHS[pk].tiers[t].key] === want,
        pk + ' tier ' + (t + 1) + ' mapped wrong (' + m.upg[PATHS[pk].tiers[t].key] + ' vs ' + want + ')');

    assert(m.secret.shards[0] && m.secret.shards[1] && !m.secret.shards[2] && m.secretUpg.heart,
      'secret state lost in migration');
    const m2 = migrateCheckpoint(m);
    assert(JSON.stringify(m2) === JSON.stringify(m), 'migration is not idempotent on v3');
    // grandfather rule: a web node with missing prerequisites survives
    const grand = migrateCheckpoint({ v: 2, lvl: 10, lives: 2, upg: { meteor: 1, calibrated: 1 } });
    assert(grand && grand.upg.meteor === 1 && grand.upg.calibrated === 1,
      'grandfathered web nodes were erased');
    // v1 minimal accepted with sane defaults
    const v1 = migrateCheckpoint({ v: 1, lvl: 4, score: 100, lives: 2, mode: 'classic',
      path: { arsenal: 2 }, upg: { coolant: 1, intercept: 1 } });
    assert(v1 && v1.v === 3 && v1.path.arsenal === 2 && v1.upg.intercept === 1 &&
      v1.livesMax >= v1.lives && v1.stacks.orb === 0 && v1.adapt === 1,
      'v1 checkpoint did not normalize cleanly');
    // hostile shapes: reject or normalize, never throw, never brick startup
    for (const bad of [null, 7, 'x', [], {}, { v: 9, lvl: 9 }, { v: 2 }, { v: 2, lvl: 'x' },
      { v: 2, lvl: 2 }, { v: 2, lvl: 9, path: 'lol', upg: 7, stacks: [1, 2], secret: 3 }]) {
      let out = null, threw = false;
      try { out = migrateCheckpoint(bad); } catch (e) { threw = true; }
      assert(!threw, 'migrateCheckpoint threw on ' + JSON.stringify(bad));
      if (out) assert(out.v === 3 && typeof out.path === 'object' && typeof out.upg === 'object',
        'hostile shape produced a malformed checkpoint');
    }
    return 'v2 lossless → v3 · idempotent · grandfathered web keys kept · v1 + 10 hostile shapes safe';
  });

  // 3) wall/flyer non-overlap — the core geometric invariant (classic)
  function overlapTest(lvl) {
    return async () => {
      const e0 = ERR.length;
      SETTINGS.mode = 'classic';
      resetRun(lvl, true);
      G.lives = 99;
      let overlaps = 0, maxFlyers = 0, framesSampled = 0;
      const samples = [];
      await runFrames(1800, f => {
        if (G.state === 'upgrade' || G.state === 'gameover') return false; // wave over — enough sampled
        if (G.state === 'serve') fireAction(); // flyers only launch during play
        steerBallOrAim('classic');
        framesSampled = f + 1;
        const flyers = [], boxed = [];
        for (const br of G.bricks) {
          if (br.dead) continue;
          if (br.flight && br.flight.state >= 2 && !br.dive) flyers.push(br);
          else if (!bareMon(br) && !br.isBoss && !br.entry) boxed.push(br);
        }
        if (flyers.length > maxFlyers) maxFlyers = flyers.length;
        for (const a of flyers) {
          const ax = a.bx + G.fx, ay = a.by + G.fy;
          for (const b of boxed) {
            const bx = b.bx + G.fx, by = b.by + G.fy;
            if (Math.abs(ax - bx) < (a.w + b.w) / 2 && Math.abs(ay - by) < (a.h + b.h) / 2) {
              overlaps++;
              if (samples.length < 3) {
                samples.push('f' + f + ' ' + (NAMES[a.poke.id] || a.poke.id) + '(' + (ax | 0) + ',' + (ay | 0) +
                  ') vs ' + (NAMES[b.poke.id] || b.poke.id) + '(' + (bx | 0) + ',' + (by | 0) + ')');
              }
            }
          }
        }
      });
      assert(ERR.length === e0, 'errors during sim: ' + ERR.slice(e0).join(' | '));
      assert(overlaps === 0, overlaps + ' flyer↔wall overlaps, e.g. ' + samples.join(' ; '));
      assert(maxFlyers === 0, 'classic produced ' + maxFlyers + ' free flyers');
      return framesSampled + ' frames sampled, brick-only throughout, free flyers 0';
    };
  }
  for (const lvl of [5, 8, 14, 20, 26]) test('non-overlap: level ' + lvl, overlapTest(lvl));

  // 3b) flyer↔FLYER non-overlap — the separation solver runs in every mode now,
  // so flocks never bump each other into a blob (checked in blaster + junkie)
  function flyerFlyerTest(mode, lvl) {
    return async () => {
      const e0 = ERR.length;
      SETTINGS.mode = mode;
      resetRun(lvl, true);
      G.lives = 99;
      let overlaps = 0, maxFlyers = 0; const samples = [];
      await runFrames(1400, f => {
        if (G.state === 'upgrade' || G.state === 'gameover') return false;
        if (G.state === 'serve') fireAction();
        steerBallOrAim(mode);
        const fl = G.bricks.filter(b => !b.dead && b.flight && b.flight.state >= 2 && !b.dive && !b.entry && !b.flight.entering);
        if (fl.length > maxFlyers) maxFlyers = fl.length;
        for (let i = 0; i < fl.length; i++) for (let j = i + 1; j < fl.length; j++) {
          const a = fl[i], b = fl[j];
          const minD = (Math.min(a.w, a.h) + Math.min(b.w, b.h)) * 0.5; // hard overlap only
          if (Math.hypot((a.bx + G.fx) - (b.bx + G.fx), (a.by + G.fy) - (b.by + G.fy)) < minD) {
            overlaps++;
            if (samples.length < 3) samples.push('f' + f + ' ' + (NAMES[a.poke.id] || a.poke.id) + ' vs ' + (NAMES[b.poke.id] || b.poke.id));
          }
        }
      });
      assert(ERR.length === e0, 'errors during sim: ' + ERR.slice(e0).join(' | '));
      // the solver keeps flocks from BLOBBING (a blob = hundreds/thousands of
      // overlap-frames over the run). A handful of single-frame transient
      // touches among fast-moving sprites is invisible and acceptable.
      assert(overlaps <= 6, mode + ' L' + lvl + ': ' + overlaps + ' flyer↔flyer overlap-frames (blob) — e.g. ' + samples.join(' ; '));
      return mode + ' L' + lvl + ' — peak flyers ' + maxFlyers + (maxFlyers < 2 ? ' (few flyers)' : '') + ', overlap-frames ' + overlaps + '/1400';
    };
  }
  test('flyer↔flyer non-overlap: junkie L4', flyerFlyerTest('junkie', 4));
  test('flyer↔flyer non-overlap: blaster L8', flyerFlyerTest('blaster', 8));

        let threw = false;
        try { JSON.parse(localStorage.getItem('pkbrk-settings') || '{}'); } catch (e) { threw = true; }
        throw new Skip('no loadStore() helper exists yet (raw JSON.parse threw: ' + threw + ')');
      }
      const s = loadStore('pkbrk-settings', '{}');
      assert(s !== null && typeof s === 'object' && !Array.isArray(s),
        "loadStore('pkbrk-settings','{}') on corrupt data returned " + JSON.stringify(s) + ', expected an object');
      for (const k of KEYS) {
        localStorage.setItem(k, '{corrupt'); // loadStore may have cleaned it — re-corrupt each
        let v;
        try { v = loadStore(k, FALLBACK[k]); }
        catch (e) { assert(false, 'loadStore(' + k + ') threw on corrupt data: ' + e.message); }
        const want = JSON.parse(FALLBACK[k]);
        assert(typeof v === typeof want && Array.isArray(v) === Array.isArray(want),
          'loadStore(' + k + ') gave ' + JSON.stringify(v) + ', expected the ' + FALLBACK[k] + ' fallback shape');
      }
      return 'all 5 keys recover to their fallbacks without throwing';
    } finally {
      for (const k of KEYS) {
        if (saved[k] === null) localStorage.removeItem(k);
        else localStorage.setItem(k, saved[k]);
      }
    }
  });

  test('classic region bricks: framed behaviors, boss-only finales', async () => {
    const seen = [];
    SETTINGS.mode = 'classic'; SETTINGS.preset = 'easy';
    for (let region = 0; region < GENS.length; region++) {
      resetRun(region * STAGES + 1, true, { seed: 'behavior-' + region });
      const expected = Object.keys(BRICK_BEHAVIORS)[region];
      const special = G.bricks.filter(b => b.behavior);
      assert(special.some(b => b.behavior === expected), 'region ' + region + ' missing ' + expected + ' bricks');
      assert(G.bricks.every(b => !bareMon(b)), 'classic region ' + region + ' spawned a bare enemy');
      assert(G.bricks.every(b => b.poke.id !== GENS[region].boss.id), 'boss species appeared before finale in ' + GENS[region].name);
      seen.push(expected);
    }
    resetRun(3, true, { seed: 'boss-stage' });
    assert(G.bricks.some(b => b.isBoss || b.subBoss), 'finale did not contain boss bricks');
    assert(!G.bricks.some(b => b.behavior), 'boss finale received regular-region brick behaviors');
    return '9 framed behavior families: ' + seen.join(', ') + '; bosses isolated to finales';
  });

  test('brick behavior collision rules', async () => {
    SETTINGS.mode = 'classic'; resetRun(1, true, { seed: 'behavior-collision' });
    const mk = (x, col, behavior) => ({ bx: x, by: 180, hx: x, hy: 180, row: 0, col,
      w: 70, h: 50, hp: 2, maxHp: 2, behavior, poke: { id: 74, t: 'rock' }, flash: 0, wobble: 0 });
    const target = mk(360, 1, null), gen = mk(300, 0, 'shield');
    G.bricks = [gen, target];
    damageBrick(target, 1, target.bx, target.by, null);
    assert(target.hp === 2, 'shielded neighbor took damage');
    damageBrick(gen, 99, gen.bx, gen.by, null);
    damageBrick(target, 1, target.bx, target.by, null);
    assert(target.hp === 1, 'target stayed shielded after generator broke');
    const split = mk(450, 4, 'split'); G.bricks = [split];
    damageBrick(split, 99, split.bx, split.by, null);
    assert(G.bricks.filter(b => b.miniBrick && !b.dead).length === 2, 'splitter did not create two mini bricks');
    return 'shield generator blocks damage until broken; splitter creates 2 ball-breakable minis';
  });

  test('daily seed repeats formations, upgrades, and starter', async () => {
    const snap = () => JSON.stringify({
      mode: G.mode, starter: G.starter,
      bricks: G.bricks.map(b => [b.poke.id, b.row, b.col, b.hp, b.behavior || '', Math.round(b.hx)]),
      choices: (G.upgradeChoices || []).map(c => c.pathKey || c.stack.key),
    });
    startDailyRun(); rollUpgradeChoices(); const a = snap();
    startDailyRun(); rollUpgradeChoices(); const b = snap();
    assert(a === b, 'same-day daily setup changed between resets');
    assert(G.daily && G.mode === 'classic' && G.starter === 'fire' && SETTINGS.preset === 'normal', 'daily ruleset is not fixed');
    return dailyDateKey() + ' repeats walls + draft exactly; classic / normal / Charmander fixed';
  });

  test('queued intros + detailed run summary', async () => {
    G.state = 'menu'; G.announce = null; G.announceQueue = [];
    setAnnounce('star', '#fff', 'FIRST', 'ONE', 0.02);
    setAnnounce('shield', '#fff', 'SECOND', 'TWO', 0.5);
    assert(G.announce.name === 'FIRST' && G.announceQueue.length === 1, 'second intro overwrote the first');
    update(0.03);
    assert(G.announce && G.announce.name === 'SECOND', 'queued intro did not advance in sequence');
    SETTINGS.mode = 'classic'; resetRun(1, true, { seed: 'summary' });
    G.score = 4321; G.lives = 1; G.bestRally = 8; G.maxCombo = 11; G.caughtRun = 2;
    G.runStats = { bricksBroken: 19, bossesDefeated: 0, itemsCaught: 4, damageTaken: 0 };
    loseLife('TEST FINAL CAUSE');
    assert(G.state === 'gameover' && G.runSummary, 'game over did not create summary');
    assert(G.runSummary.cause === 'TEST FINAL CAUSE' && G.runSummary.bricks === 19 && G.runSummary.items === 4,
      'summary omitted cause or run statistics');
    return 'intro cards advance without overlap; summary records score, cause, rally, combo, bricks, items, catches';
  });

  test('touch control customization mirrors and scales pads', async () => {
    const old = { left: SETTINGS.leftHanded, scale: SETTINGS.buttonScale, opacity: SETTINGS.buttonOpacity, follow: SETTINGS.touchFollow };
    try {
      SETTINGS.mode = 'blaster'; G.mode = 'blaster'; SETTINGS.leftHanded = false; SETTINGS.buttonScale = 1;
      const right = touchButtons();
      SETTINGS.leftHanded = true; SETTINGS.buttonScale = 1.25;
      const left = touchButtons();
      assert(right.fire.x > W / 2 && left.fire.x < W / 2, 'left-handed mode did not mirror FIRE');
      assert(Math.abs(left.fire.r / right.fire.r - 1.25) < 0.001, 'button scale did not resize FIRE');
      settingsPage = 1; const A = advLayout();
      assert(A.sliders.length === 3 && A.toggles.length === 2, 'touch settings tab is incomplete');
      const tab = A.tab(0), firstSlider = A.slider(0);
      assert(firstSlider.y - 17 > tab.y + tab.h + 8, 'settings tabs collide with the first slider label');
      const P = pauseActionLayout();
      assert(P.settings.x + P.settings.w < P.quit.x && P.quit.x + P.quit.w <= W,
        'pause settings / quit actions overlap or leave the viewport');
      return 'left-handed mirror + sizing; settings layout is readable and available from pause';
    } finally {
      SETTINGS.leftHanded = old.left; SETTINGS.buttonScale = old.scale;
      SETTINGS.buttonOpacity = old.opacity; SETTINGS.touchFollow = old.follow; settingsPage = 0;
    }
  });

  test('Kanto Rift Key replaces Mew with Mew VMAX', async () => {
    SETTINGS.mode = 'classic'; SETTINGS.preset = 'easy';
    resetRun(1, true, { seed: 'rift-key' });
    G.trial = false; G.daily = false; // enable the feature without touching the real checkpoint
    for (let i = 0; i < 3; i++) {
      G.level = i + 1;
      const shard = spawnRiftShard(i, W / 2, 150);
      assert(shard && shard.secretShard && G.secret.pendingShard === i,
        'piece ' + (i + 1) + ' did not spawn as a guaranteed secret pickup');
      collectPickup(shard);
      assert(G.secret.shards[i] && G.secret.pendingShard == null,
        'piece ' + (i + 1) + ' did not join the Rift Key');
    }
    assert(secretShardCount() === 3, 'completed Rift Key did not report 3/3');
    G.level = 3; G.gauntlet = { phase: 1, legendHp: 13 }; G.bricks = [];
    gauntletSummonMythic();
    const vmax = G.bricks.find(b => b.isBoss && !b.dead);
    assert(vmax && vmax.secretBoss && vmax.mewVmax && vmax.poke.n === 'MEW VMAX',
      'complete Rift Key still summoned normal Mew');
    assert(G.secret.vmax && vmax.maxHp >= 18, 'secret encounter state or moderate boss durability missing');
    drawBackground(); drawBricks();

    G.secret = freshSecretState(); G.secret.offered[2] = true; // the third shard was allowed to close
    G.gauntlet = { phase: 1, legendHp: 13 }; G.bricks = [];
    gauntletSummonMythic();
    const normal = G.bricks.find(b => b.isBoss && !b.dead);
    assert(normal && !normal.secretBoss && normal.poke.id === 151,
      'incomplete key no longer preserves the normal Mew finale');
    return '3 guaranteed pieces; complete key summons 18+ HP Mew VMAX; incomplete key keeps Mew';
  });

  test('Mew VMAX grants a bonus secret-only upgrade draft', async () => {
    SETTINGS.mode = 'classic'; resetRun(1, true, { seed: 'rift-reward' });
    G.trial = false; G.daily = false; // test true-journey rewards in memory only
    const ordinary = [{ stack: STACK_ITEMS[0] }];
    G.state = 'upgrade'; G.secret.rewardDraft = true; G.secret.vmax = true;
    G.secret.deferredChoices = ordinary;
    G.upgradeChoices = SECRET_UPGRADES.map(secret => ({ secret }));
    assert(G.upgradeChoices.length === 3 && new Set(G.upgradeChoices.map(c => c.secret.key)).size === 3,
      'secret draft is not a fixed set of three unique rewards');
    const hp0 = G.livesMax;
    pickUpgrade(0);
    assert(G.secretUpg.heart && G.livesMax === hp0 + 1 && G.lives === G.livesMax && G.mega === 1,
      'Paradox Heart did not grant max HP, full healing, and full Mega');
    assert(!G.secret.rewardDraft && !G.secret.vmax && G.upgradeChoices === ordinary,
      'secret choice did not hand off to the normal Kanto reward');
    applySecretUpgrade(SECRET_UPGRADES[1]); applySecretUpgrade(SECRET_UPGRADES[2]);
    assert(G.secretUpg.lens && G.secretUpg.echo,
      'Rift Lens or Echo Relay could not be equipped as secret-only upgrades');
    return 'fixed 3-choice bonus draft; Heart, Lens, and Relay effects equip; ordinary draft follows';
  });

  // ---- runner -------------------------------------------------------------
  async function main() {
    await tick();
    for (const t of TESTS) {
      const tr = addRow(t.name);
      const t0 = performance.now();
      let status = 'PASS', detail = '';
      try {
        detail = (await t.fn()) || '';
      } catch (e) {
        if (e instanceof Skip) { status = 'SKIP'; detail = e.message; }
        else { // keep the top of the stack — "undefined is not a function" alone is undebuggable
          status = 'FAIL';
          detail = (e.message || String(e)) +
            (e.stack ? ' @ ' + String(e.stack).split('\n').slice(1, 3).join(' <- ').replace(/https?:\/\/[^\s/]+/g, '') : '');
        }
      }
      const ms = performance.now() - t0;
      finishRow(tr, status, ms, detail);
      console.log('[TEST] ' + status + '  ' + t.name + '  (' + Math.round(ms) + 'ms)' + (detail ? '  — ' + detail : ''));
      RESULTS.push({ name: t.name, status, ms: Math.round(ms), detail });
      resetBetween();
      await tick();
    }
    const passed = RESULTS.filter(r => r.status === 'PASS').length;
    const failed = RESULTS.filter(r => r.status === 'FAIL').length;
    const skipped = RESULTS.filter(r => r.status === 'SKIP').length;
    const line = passed + '/' + RESULTS.length + ' PASSED' +
      (failed ? ' · ' + failed + ' FAILED' : '') + (skipped ? ' · ' + skipped + ' SKIPPED' : '');
    summaryEl.textContent = line;
    summaryEl.className = failed ? 'fail' : 'pass';
    console.log('[TEST SUITE] ' + line);
    window.TEST_RESULTS = RESULTS;
    window.TEST_DONE = true;
  }

  window.addEventListener('load', () => {
    // deterministic knobs regardless of whatever the player has saved locally —
    // in-memory only (saveSettings is never called), so the real save is untouched
    try {
      SETTINGS.drops = 1; SETTINGS.speed = 1; SETTINGS.preset = 'easy';
      SETTINGS.sfx = 0; SETTINGS.music = 0; SETTINGS.starter = 'none';
      SETTINGS.mode = 'classic'; SETTINGS.autoFire = false;
      if (typeof MUSIC !== 'undefined') MUSIC.on = false;
      ensureViewport();
    } catch (e) { ERR.push('settings normalization failed: ' + e.message); }
    summaryEl.textContent = 'running…';
    main().catch(e => {
      summaryEl.textContent = 'SUITE CRASHED: ' + (e.message || e);
      summaryEl.className = 'fail';
      window.TEST_RESULTS = RESULTS;
      window.TEST_DONE = true;
    });
  });
})();
