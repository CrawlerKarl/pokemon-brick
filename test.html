<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Wavebreaker — invariant tests</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #05060f; color: #cfd8ea; font: 13px/1.5 Menlo, Consolas, monospace; }
  body { overflow: auto; }
  /* the game canvas must exist for the engine, but the report owns the page */
  #game { position: fixed; top: 0; left: 0; z-index: 0; opacity: 0.14; pointer-events: none; }
  #safe-probe { position: fixed; bottom: 0; height: env(safe-area-inset-bottom, 0px); width: 1px; visibility: hidden; }
  #report { position: relative; z-index: 1; max-width: 980px; margin: 0 auto; padding: 22px 18px 60px; }
  h1 { font-size: 16px; color: #8ab4ff; margin-bottom: 4px; }
  #summary { font-size: 20px; font-weight: bold; margin: 10px 0 16px; color: #ffd54f; }
  #summary.pass { color: #66bb6a; }
  #summary.fail { color: #ff5252; }
  table { border-collapse: collapse; width: 100%; background: rgba(10, 14, 30, 0.92); }
  th, td { border: 1px solid #1d2942; padding: 6px 9px; text-align: left; vertical-align: top; }
  th { color: #8ab4ff; background: #0b1020; }
  td.status { font-weight: bold; white-space: nowrap; }
  tr.PASS td.status { color: #66bb6a; }
  tr.FAIL td.status { color: #ff5252; }
  tr.SKIP td.status { color: #ffb74d; }
  tr.RUN  td.status { color: #8ab4ff; }
  td.ms { text-align: right; white-space: nowrap; color: #7c8db0; }
  td.detail { word-break: break-word; color: #aab6cf; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="safe-probe"></div>
<div id="report">
  <h1>Wavebreaker — in-browser invariant suite</h1>
  <div id="summary">loading game scripts…</div>
  <table>
    <thead><tr><th>test</th><th>status</th><th>ms</th><th>detail</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script>
'use strict';
// ---- pre-game shims (MUST run before the game scripts load) ----
// 1) capture every uncaught error / rejection so tests can assert "no exception"
window.__ERRORS = [];
window.addEventListener('error', e => {
  window.__ERRORS.push((e.message || 'error') + ' @ ' + (e.filename || '?') + ':' + (e.lineno || 0));
});
window.addEventListener('unhandledrejection', e => {
  window.__ERRORS.push('unhandledrejection: ' + (e.reason && e.reason.message || e.reason));
});
// 2) swallow the game's requestAnimationFrame loop — the suite drives update()
//    manually, exactly like the console-driven sim in CLAUDE.md, so backgrounded
//    rAF throttling can never starve the tests.
window.__realRAF = window.requestAnimationFrame.bind(window);
window.requestAnimationFrame = function () { return 0; };
</script>

<!-- same scripts, same order as index.html -->
<script src="js/setup.js"></script>
<script src="js/config.js"></script>
<script src="js/audio.js"></script>
<script src="js/data.js"></script>
<script src="js/scenery.js"></script>
<script src="js/state.js"></script>
<script src="js/input.js"></script>
<script src="js/update.js"></script>
<script src="js/render.js"></script>
<script src="js/dev.js"></script>
<script src="js/main.js"></script>

<script>
'use strict';
/* eslint-disable no-undef */
(function () {
  const ERR = window.__ERRORS;
  const RESULTS = [];
  const rowsEl = document.getElementById('rows');
  const summaryEl = document.getElementById('summary');
  const tick = () => new Promise(r => setTimeout(r, 0));

  function addRow(name) {
    const tr = document.createElement('tr');
    tr.className = 'RUN';
    tr.innerHTML = '<td></td><td class="status">RUN…</td><td class="ms"></td><td class="detail"></td>';
    tr.children[0].textContent = name;
    rowsEl.appendChild(tr);
    return tr;
  }
  function finishRow(tr, status, ms, detail) {
    tr.className = status;
    tr.children[1].textContent = status;
    tr.children[2].textContent = String(Math.round(ms));
    tr.children[3].textContent = detail || '';
  }

  // assertion helper: throws to fail the enclosing test
  function assert(cond, msg) { if (!cond) throw new Error(msg); }
  class Skip extends Error {}

  // Some headless/embedded browsers lay the page out at 0×0, which makes
  // resize() bail and leaves every geometry degenerate. If the real viewport
  // is unusable, force a fixed virtual one — deterministic for automation.
  let FORCED_VIEWPORT = false;
  function forceViewport(w, h) {
    FORCED_VIEWPORT = true;
    DPR = 1; W = w; H = h; SAFE_B = 0;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    canvas.width = W; canvas.height = H;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    buildStars(); buildVignette(); bgGen = -1;
    G.paddle.x = W / 2;
  }
  function ensureViewport() {
    resize();
    if (W < 100 || H < 100) forceViewport(900, 700);
  }

  // ---- shared sim helpers -------------------------------------------------
  // the proven headless-driving pattern: force-run each frame, steer, update
  async function runFrames(n, perFrame) {
    for (let f = 0; f < n; f++) {
      paused = false; G.freeze = 0;
      if (perFrame && perFrame(f) === false) return f;
      update(1 / 60);
      if ((f & 511) === 511) await tick(); // stay responsive on long runs
    }
    return n;
  }
  function nanScan() {
    const bad = [];
    for (const b of G.balls) {
      if (!Number.isFinite(b.x) || !Number.isFinite(b.y) || !Number.isFinite(b.vx) || !Number.isFinite(b.vy)) {
        bad.push('ball(' + b.x + ',' + b.y + ' v ' + b.vx + ',' + b.vy + ')');
      }
    }
    for (const br of G.bricks) {
      if (!Number.isFinite(br.bx) || !Number.isFinite(br.by) || !Number.isFinite(br.hx) || !Number.isFinite(br.hy)) {
        bad.push('brick#' + (br.poke && br.poke.id) + '(' + br.bx + ',' + br.by + ')');
      }
    }
    if (!Number.isFinite(G.paddle.x)) bad.push('paddle.x=' + G.paddle.x);
    return bad;
  }
  function aliveBricks() { return G.bricks.filter(b => !b.dead).length; }
  function steerBallOrAim(mode) {
    if (mode === 'classic') {
      const b = G.balls.find(bb => !bb.dead);
      mouseX = b ? b.x : W / 2;
    } else {
      // aim the blaster: park under the nearest living target so fire connects
      let tgt = null, td = Infinity;
      for (const br of G.bricks) {
        if (br.dead) continue;
        const d = Math.abs(br.bx + G.fx - G.paddle.x);
        if (d < td) { td = d; tgt = br; }
      }
      mouseX = tgt ? Math.max(20, Math.min(W - 20, tgt.bx + G.fx)) : W / 2;
      lastMouseY = H - 40; // junkie: keep the ship low in its band
    }
  }
  function resetBetween() {
    try {
      fireHeld = false; chargeHeld = false; trialOpen = false; advOpen = false; upgradeTreeOpen = false;
      dragSlider = -1; settingsPage = 0;
      SETTINGS.mode = 'classic'; SETTINGS.autoFire = false;
      resetRun(1, true);
      G.state = 'menu';
      paused = false; G.freeze = 0;
      mouseX = W / 2; lastMouseY = H / 2;
    } catch (e) { ERR.push('between-test reset failed: ' + e.message); }
  }

  // ---- the tests ----------------------------------------------------------
  const TESTS = [];
  function test(name, fn) { TESTS.push({ name, fn }); }

  // 1) startup: scripts loaded, one resize + update + render, no errors, menu state
  test('startup', async () => {
    ensureViewport();
    paused = false; G.freeze = 0;
    update(1 / 60);
    render();
    assert(G.state === 'menu', "G.state is '" + G.state + "', expected 'menu'");
    assert(ERR.length === 0, 'errors during load/startup: ' + ERR.join(' | '));
    return 'scripts loaded, resize+update+render clean, W×H=' + W + '×' + H +
      (FORCED_VIEWPORT ? ' (viewport reported 0×0 — forced virtual 900×700)' : '');
  });

  // 1b) every pilot attack shape renders at every evolution tier — a tier-III
  // fire pilot once CRASHED here (negative ember radius throws in ctx.arc)
  test('typed bolts render at all tiers', async () => {
    ensureViewport();
    const shapes = ['flame', 'draco', 'fist', 'aqua', 'shard', 'gear', 'leaf', 'sting',
      'venom', 'quake', 'gale', 'pixel', 'psy', 'star', 'wisp', 'claw', 'volt', null];
    const elements = ['fire', 'water', 'grass', 'electric', 'psychic', 'dark'];
    let drawn = 0;
    for (const shape of shapes) {
      for (let tier = 1; tier <= 3; tier++) {
        for (let k = 0; k < 4; k++) { // several phases so time-varying maths runs
          G.time = k * 0.61;
          drawTypedBolt({ x: 120 + k * 40, y: 200, shape, element: elements[k % elements.length], tier });
          drawn++;
        }
      }
    }
    assert(ERR.length === 0, 'typed-bolt rendering threw: ' + ERR.join(' | '));
    return shapes.length + ' shapes × 3 tiers rendered clean (' + drawn + ' draws)';
  });

  test('STARFIGHTER projectile grammar: threat, silhouettes, collision, interception', async () => {
    const e0 = ERR.length;
    SETTINGS.mode = 'junkie'; SETTINGS.preset = 'normal'; SETTINGS.starter = 'fire';
    resetRun(1, true, { seed: 'projectile-grammar' });
    G.state = 'play'; G.lives = G.livesMax = 4; G.invuln = 99;
    const early = diff();
    const tank = { maxHp: 99, elite: 0, poke: { id: 4, t: 'fire' } };
    const ep = starEnemyPattern(tank);
    assert(ep.classKey === 'micro', 'Kanto tank inherited heavy fire from HP (' + ep.classKey + ')');
    const elite = starEnemyPattern({ maxHp: 2, elite: 2, poke: { id: 5, t: 'fire' } });
    assert(elite.classKey === 'heavy' && elite.count === 1, 'explicit elite lost its heavy profile');
    G.level = 25;
    const late = diff();
    assert(late.starShotInt < early.starShotInt && late.starThreatCap > early.starThreatCap,
      'journey fire curve does not trade cadence for a larger late threat budget');
    assert(Object.keys(BOSS_PROJECTILE_KIND).length === BOSS_ONLY_IDS.size &&
      [...BOSS_ONLY_IDS].every(id => BOSS_PROJECTILE_KIND[id]),
      'every boss-only species needs an explicit projectile silhouette');
    const finaleBosses = GENS.flatMap(gen => [
      { id: gen.boss.id, t: gen.boss.t, phaseCount: 2 },
      { id: gen.gauntlet.myth[0], t: gen.gauntlet.myth[1], phaseCount: 3 },
    ]);
    for (const spec of finaleBosses) {
      G.enemyShots = [];
      const br = { poke: { id: spec.id, t: spec.t }, phase: spec.phaseCount,
        phaseCount: spec.phaseCount, mythic: spec.phaseCount === 3 };
      spawnBossFire(br, 500, 160, diff(), {});
      assert(G.enemyShots.length && G.enemyShots.every(s => s.boss && s.species === spec.id && s.kind),
        'boss ' + spec.id + ' did not emit its authored final-phase fire');
    }
    for (const kind of new Set(Object.values(BOSS_PROJECTILE_KIND).concat(Object.values(TYPE_PROJECTILE_KIND)))) {
      for (const cls of Object.keys(SHOT_CLASSES)) enemyShotSprite(kind, '#80d8ff', SHOT_CLASSES[cls].visualR);
    }
    assert(SHOT_CLASSES.micro.visualR >= 8 && SHOT_CLASSES.micro.hitR <= 3.5 &&
      SHOT_CLASSES.micro.tail >= 20, 'micro fire is not visually readable while retaining a forgiving hitbox');
    assert(ENEMY_SHOT_DRAW_SCALE.stinger >= 1.25 && ENEMY_SHOT_DRAW_SCALE.needle >= 1.2,
      'thin stinger/needle silhouettes lost their render-only readability scale');
    G.level = 1; G.enemyShots = []; G.lasers = []; G.invuln = 99;
    const siege = spawnEnemyShot({ x: 300, y: 300, vx: 0, vy: 0, type: 'rock', species: 377, classKey: 'massive' });
    assert(siege.visualR >= 40 && siege.hitR <= 24 && siege.visualR > siege.hitR * 1.8,
      'massive art and hit radius are not independent');
    for (let hit = 0; hit < 3; hit++) {
      G.lasers = [{ x: 300, y: 315, basic: true }];
      paused = false; G.freeze = 0; update(1 / 60);
      if (hit < 2) assert(!siege.dead, 'massive shot broke after only ' + (hit + 1) + ' basic hit(s)');
    }
    assert(siege.dead, 'three basic hits did not break the massive shot');
    // A super-effective heavy hit is still exactly one life on Adventure.
    G.enemyShots = []; G.lasers = []; G.invuln = 0; G.shieldCharges = 0; G.lives = 4;
    mouseX = G.paddle.x; lastMouseY = G.shipYv; // keep the simulated pilot still during the impact frame
    spawnEnemyShot({ x: G.paddle.x, y: shipY() - 2, vx: 0, vy: 100, type: 'water', classKey: 'heavy' });
    update(1 / 60);
    assert(G.lives === 3, 'heavy super-effective fire removed more than one life (4 → ' + G.lives + ')');
    assert(ERR.length === e0, 'projectile grammar threw: ' + ERR.slice(e0).join(' | '));
    return BOSS_ONLY_IDS.size + ' boss silhouettes · HP/rank separated · massive shot 3 basics · Adventure hit = 1 life';
  });

  test('STARFIGHTER heat: time-normalised Adventure overheat and useful cooling', async () => {
    const e0 = ERR.length;
    const holdTime = (starter, coolant) => {
      SETTINGS.mode = 'junkie'; SETTINGS.preset = 'normal'; SETTINGS.starter = starter;
      resetRun(1, true, { seed: 'heat-' + starter + '-' + coolant });
      G.state = 'play'; G.lives = G.livesMax = 99; G.invuln = 999;
      for (const b of G.bricks) { b.hp = b.maxHp = 9999; b.shellArmor = false; }
      if (coolant) G.upg.coolant = 1;
      let frames = 0;
      while (G.overheat <= 0 && frames < 2400) {
        fireAction(true);
        G.lasers = []; G.enemyShots = []; G.telegraphs = [];
        G.enemyShotCD = 999; G.bossShotCD = 999;
        paused = false; G.freeze = 0; update(1 / 60);
        frames++;
      }
      return frames / 60;
    };
    const base = holdTime('none', false);
    const fast = holdTime('electric', false);
    const cool = holdTime('none', true);
    assert(base >= 6.5 && base <= 8.8, 'Adventure base overheat landed at ' + base.toFixed(2) + 's');
    assert(Math.abs(fast - base) <= 1.2, 'fast partner changed overheat time too much (' + fast.toFixed(2) + ' vs ' + base.toFixed(2) + ')');
    assert(cool >= 20, 'Coolant is not materially useful (' + cool.toFixed(2) + 's)');
    assert(ERR.length === e0, 'heat simulation threw: ' + ERR.slice(e0).join(' | '));
    return 'Adventure ' + base.toFixed(1) + 's · fast partner ' + fast.toFixed(1) + 's · Coolant ' + cool.toFixed(1) + 's';
  });

  test('soundtrack: nine original route identities and nine distinct boss arrangements', async () => {
    assert(ADVENTURE_MUSIC.length === 9, 'expected nine regional music identities');
    const routeSignatures = new Set(), bossSignatures = new Set();
    let brightScales = 0;
    for (let i = 0; i < ADVENTURE_MUSIC.length; i++) {
      const route = buildMusicPattern(i, false), boss = buildMusicPattern(i, true);
      assert(route.cfg.title && boss.cfg.title && route.cfg.title !== boss.cfg.title,
        route.cfg.region + ' route/boss titles are not distinct');
      assert(boss.cfg.bpm > route.cfg.bpm, route.cfg.region + ' boss arrangement is not more urgent');
      assert(route.melody.filter(n => n != null).length >= 40 && boss.melody.filter(n => n != null).length >= 64,
        route.cfg.region + ' pattern is too sparse to carry a theme');
      assert(route.cfg.voice !== boss.cfg.voice || route.cfg.motif.join(',') !== boss.cfg.motif.join(','),
        route.cfg.region + ' boss reuses the route identity unchanged');
      if (route.cfg.scale.includes(4)) brightScales++;
      routeSignatures.add([route.cfg.bpm, route.cfg.voice, route.cfg.scale, route.cfg.motif, route.cfg.rhythm].join('|'));
      bossSignatures.add([boss.cfg.bpm, boss.cfg.voice, boss.cfg.scale, boss.cfg.motif, boss.cfg.rhythm].join('|'));
    }
    assert(routeSignatures.size === 9 && bossSignatures.size === 9,
      'regional themes are not musically unique');
    assert(brightScales >= 7, 'exploration score does not lean happy/major enough (' + brightScales + '/9 bright scales)');
    return '9 route themes + 9 boss arrangements · ' + brightScales + '/9 bright scales · unique motifs/voices/rhythms';
  });

  test('upgrade web camera: zoomed start, anchored zoom, fit range', async () => {
    // camera math is asserted at the canonical viewport — at unusual real
    // window shapes (e.g. very tall panes) the pan clamp can legitimately
    // fight the anchor, which is a layout question, not a camera regression
    forceViewport(900, 700);
    SETTINGS.mode = 'junkie'; SETTINGS.starter = 'none';
    resetRun(1, true);
    assert(treeZoom >= 1.14, 'web did not start zoomed in (' + treeZoom + ')');
    treePan.x = 0; treePan.y = 0; treeZoom = 1;
    const a = upgradeTreeLayout(), n0 = a.node(0, 3);
    const mx = a.map.x + a.map.w / 2, my = a.map.y + a.map.h / 2;
    setTreeZoomAt(mx, my, 1.5);
    const b = upgradeTreeLayout(), n1 = b.node(0, 3);
    const d0 = Math.hypot(n0.cx - mx, n0.cy - my), d1 = Math.hypot(n1.cx - mx, n1.cy - my);
    assert(Math.abs(d1 / d0 - 1.5) < 0.04, 'camera zoom did not scale around its anchor');
    setTreeZoomAt(mx, my, 99); assert(treeZoom === 1.85, 'maximum zoom clamp failed');
    setTreeZoomAt(mx, my, 0.01); assert(treeZoom === 0.65, 'fit/minimum zoom clamp failed');
    resetTreeCamera();
    assert(treeNodeVisualState(false, true, false) === 'offered' &&
      treeNodeVisualState(true, false, true) === 'owned' &&
      treeNodeVisualState(false, false, true) === 'reachable' &&
      treeNodeVisualState(false, false, false) === 'locked', 'upgrade-web visual state precedence changed');
    assert(TREE_NODE_ALPHA.offered > TREE_NODE_ALPHA.owned && TREE_NODE_ALPHA.owned > TREE_NODE_ALPHA.reachable &&
      TREE_NODE_ALPHA.reachable > TREE_NODE_ALPHA.locked, 'unavailable nodes are not progressively dimmer');
    return 'default ' + Math.round(treeZoom * 100) + '% · anchored scale · 65–185% clamp · offers-only luminance';
  });

  // 1c) THE NINEFOLD DAWN: stage 27 must END a real campaign (never silently
  // build stage 28), record completion durably, keep the checkpoint, and
  // offer TIME SPIRAL as the explicit New Game+ path. Trials keep the loop.
  test('campaign completion branch', async () => {
    const priorVictory = localStorage.getItem('pkbrk-victory');
    const priorCkpt = localStorage.getItem('pkbrk-run');
    try {
      SETTINGS.mode = 'junkie';
      resetRun(27);
      G.trial = false; G.lives = 99;
      let guard = 0;
      while (G.state === 'play' && guard++ < 4000) {
        paused = false; G.freeze = 0;
        for (const b of G.bricks) if (!b.dead && !b.dormant && !b.barrier) damageBrick(b, 9999, b.bx + G.fx, b.by + G.fy);
        update(1 / 60);
      }
      assert(G.state === 'ending', "stage 27 clear entered '" + G.state + "', expected 'ending'");
      assert(G.level === 27, 'level incremented to ' + G.level + ' — the campaign must not loop uninvited');
      const rec = JSON.parse(localStorage.getItem('pkbrk-victory') || '{}');
      assert(rec && rec.everSeen && rec['junkie:' + SETTINGS.preset], 'completion record missing after the clear');
      assert(localStorage.getItem('pkbrk-run') === priorCkpt, 'the safe checkpoint was erased by the ending');
      // the ending renders through every beat without exceptions
      const e0 = ERR.length;
      for (let f = 0; f < 60 * 36; f++) { update(1 / 60); if (f % 120 === 0) render(); }
      assert(G.ending && G.ending.done, 'ending never reached its completion beat');
      render();
      assert(ERR.length === e0, 'ending render threw: ' + ERR.slice(e0).join(' | '));
      // TIME SPIRAL is the explicit continuation into the old level-28 loop
      beginTimeSpiral();
      assert(G.level === 28 && G.state === 'upgrade' && G.upgradeChoices,
        'TIME SPIRAL did not open the level-28 draft');
      // trials keep their existing flow: clearing 27 in a trial still loops
      resetRun(27, true);
      G.lives = 99; guard = 0;
      while ((G.state === 'play' || G.state === 'results') && guard++ < 4000) {
        paused = false; G.freeze = 0;
        skipResults();
        for (const b of G.bricks) if (!b.dead && !b.dormant && !b.barrier) damageBrick(b, 9999, b.bx + G.fx, b.by + G.fy);
        update(1 / 60);
      }
      skipResults();
      assert(G.state === 'upgrade' && G.level === 28, 'trial stage 27 should keep the classic loop');
      return 'stage 27 → ending (level stays 27) · record saved · checkpoint kept · 36s of beats render clean · TIME SPIRAL → 28 · trial loops';
    } finally {
      if (priorVictory == null) localStorage.removeItem('pkbrk-victory'); else localStorage.setItem('pkbrk-victory', priorVictory);
      if (priorCkpt == null) localStorage.removeItem('pkbrk-run'); else localStorage.setItem('pkbrk-run', priorCkpt);
      G.ending = null;
      resetBetween();
    }
  });

  // step through the stage-results interstitial (and any pending ceremony)
  // the same way a player's tap would — used wherever a test expects the
  // draft right after a clear
  function skipResults() {
    if (G.state === 'results') { G.stateT = 1; advanceResults(); }
    if (G.state === 'ceremony') { if (G.ceremony) G.ceremony.t = 99; advanceCeremony(); }
  }
  // 2) mode smoke ×3
  async function modeSmoke(mode, frames) {
    const e0 = ERR.length;
    SETTINGS.mode = mode;
    resetRun(1, true);
    G.lives = 99; // smoke test: survive shots — we're testing sim health, not skill
    if (mode !== 'classic') fireHeld = true;
    const startBricks = G.bricks.length;
    let reachedUpgrade = false;
    await runFrames(frames, () => {
      if (G.state === 'results') skipResults();
      if (G.state === 'upgrade') { reachedUpgrade = true; return false; }
      if (G.state === 'serve') fireAction();
      if (mode === 'classic' && G.state === 'play') fireHeld = true; // classic = ball + free-firing blaster
      steerBallOrAim(mode);
    });
    fireHeld = false;
    const nans = nanScan();
    assert(nans.length === 0, 'NaN positions: ' + nans.join(', '));
    assert(ERR.length === e0, 'errors during sim: ' + ERR.slice(e0).join(' | '));
    // real damage happened under AI control (bricks were destroyed)
    assert(reachedUpgrade || aliveBricks() < startBricks,
      'no bricks destroyed in ' + frames + ' frames (alive=' + aliveBricks() + '/' + startBricks + ')');
    // Deterministically FINISH the wave so the upgrade/draft flow is always
    // exercised — a dumb AI sinking the literal last flyer was flaky. Killing
    // the bricks routes through the same level-clear code the game uses.
    if (!reachedUpgrade) {
      if (G.state === 'serve') fireAction();
      G.reinforce = 0;
      for (const b of G.bricks) b.dead = true;
      await runFrames(400, () => { skipResults(); return G.state === 'upgrade' ? false : undefined; });
    }
    // the upgrade draft must be usable
    assert(G.state === 'upgrade', "expected 'upgrade' state, got '" + G.state + "'");
    assert(G.upgradeChoices && G.upgradeChoices.length > 0, 'no upgrade choices offered');
    pickUpgrade(0);
    assert(G.upgradeChoices === null, 'pickUpgrade(0) did not consume the draft');
    assert(G.state === 'serve' || G.state === 'play',
      "pickUpgrade(0) left state '" + G.state + "', expected serve/play");
    assert(ERR.length === e0, 'errors during pickUpgrade: ' + ERR.slice(e0).join(' | '));

  // 2w) THE UPGRADE WEB — graph integrity: adjacency, pair coverage, unique
  // keys, complete copy/visual contracts, and every eligibility gate.
  test('upgrade web: graph integrity + eligibility gates', async () => {
    assert(WEB_SPOKE_ORDER.length === 6 && PATH_KEYS.every(k => WEB_SPOKE_ORDER.includes(k)),
      'WEB_SPOKE_ORDER must be a permutation of PATH_KEYS');
    assert(WEB_BRIDGES.length === 6 && WEB_FUSIONS.length === 15 && WEB_APEXES.length === 2 &&
      WEB_SATELLITES.length === 3, 'expected 6 bridges, 15 fusions, 2 apexes, 3 satellites');
    const spokeIdx = k => WEB_SPOKE_ORDER.indexOf(k);
    for (const b of WEB_BRIDGES) {
      const d = Math.abs(spokeIdx(b.paths[0]) - spokeIdx(b.paths[1]));
      assert(d === 1 || d === 5, 'bridge ' + b.key + ' does not connect adjacent wedges');
      assert(b.name && b.icon && b.desc && b.visual && b.proc,
        'bridge ' + b.key + ' is missing copy/visual contract fields');
    }
    for (const pk of PATH_KEYS) {
      assert(WEB_BRIDGES.filter(b => b.paths.includes(pk)).length === 2,
        pk + ' must touch exactly 2 bridges');
    }
    // FUSIONS cover every unordered path pair EXACTLY once; the six adjacent
    // pairs carry their bridge, the nine cross-web pairs carry none
    const pairSeen = new Set();
    for (const f of WEB_FUSIONS) {
      const pair = f.paths.slice().sort().join('+');
      assert(!pairSeen.has(pair), 'duplicate fusion pair ' + pair);
      pairSeen.add(pair);
      const d = Math.abs(spokeIdx(f.paths[0]) - spokeIdx(f.paths[1]));
      const adjacent = d === 1 || d === 5;
      assert(adjacent === !!f.bridge, f.key + ': bridge presence must match wedge adjacency');
      if (f.bridge) {
        const br = webBridge(f.bridge);
        assert(br && br.paths.slice().sort().join('+') === pair, f.key + ' rides the wrong bridge');
      }
      assert(f.name && f.icon && f.color && f.desc && f.visual && f.proc && f.ready && f.role && f.limit,
        'fusion ' + f.key + ' is missing copy/visual/limiter contract fields');
    }
    assert(pairSeen.size === 15, 'the 15 fusions must cover all C(6,2) path pairs');
    for (const x of WEB_APEXES) {
      assert(x.paths.length === 3 && apexCompatFusions(x).length === 3,
        'apex ' + x.key + ' needs exactly three in-set fusions to choose from');
      assert(x.name && x.icon && x.color && x.desc && x.visual && x.proc && x.ready && x.role && x.limit,
        'apex ' + x.key + ' is missing contract fields');
      assert(x.mapSlot != null, 'apex ' + x.key + ' needs a map slot');
    }
    for (const sat of WEB_SATELLITES) {
      assert(stackItem(sat.stackKey) && PATHS[sat.path], 'satellite ' + sat.stackKey + ' has bad references');
    }
    const allKeys = [
      ...PATH_KEYS.flatMap(k => PATHS[k].tiers.map(t => t.key)),
      ...WEB_BRIDGE_KEYS, ...WEB_FUSION_KEYS, ...WEB_APEX_KEYS,
      ...STACK_ITEMS.map(s => s.key), ...SECRET_UPGRADES.map(s => s.key),
    ];
    assert(new Set(allKeys).size === allKeys.length, 'duplicate upgrade keys across the web');
    // eligibility walk: every FUSION reachable via Form III + 3/3 ranks +
    // either-side capstone (+ bridge when adjacent); the 2-slot cap bites
    SETTINGS.mode = 'blaster';
    resetRun(1, true);
    assert(WEB_BRIDGES.every(b => !bridgeEligible(b)), 'a bridge was eligible at Form I with no nodes');
    for (const f of WEB_FUSIONS) {
      G.path = {}; G.upg = {}; G.starterLvl = 3;
      advancePath(f.paths[0]); advancePath(f.paths[0]); advancePath(f.paths[0]);
      advancePath(f.paths[1]); advancePath(f.paths[1]); advancePath(f.paths[1]);
      assert(!fusionEligible(f), f.key + ' eligible at 3/3 without a capstone');
      advancePath(f.paths[0]); // capstone one side
      if (f.bridge) {
        assert(!fusionEligible(f), f.key + ' eligible without its bridge');
        G.upg[f.bridge] = 1;
      }
      assert(fusionEligible(f), f.key + ' not eligible with its full recipe');
      G.starterLvl = 2;
      assert(!fusionEligible(f), f.key + ' eligible before Final Form');
      G.starterLvl = 3;
      // the TWO-SLOT cap: with two other fusions owned it goes dark
      const others = WEB_FUSION_KEYS.filter(k => k !== f.key).slice(0, 2);
      for (const k of others) G.upg[k] = 1;
      assert(!fusionEligible(f), f.key + ' ignored the 2-fusion slot cap');
      assert(webLockReason(f, 'fusion').some(r => /SLOTS FULL/.test(r)),
        f.key + ' does not explain the full slots');
    }
    // APEX gates: stage 24+, two compatible fusions, nine ranks, one slot
    for (const x of WEB_APEXES) {
      G.path = {}; G.upg = {}; G.starterLvl = 3; G.level = 23;
      for (const pk of x.paths) { advancePath(pk); advancePath(pk); advancePath(pk); }
      const compat = apexCompatFusions(x);
      G.upg[compat[0].key] = 1; G.upg[compat[1].key] = 1;
      assert(!apexEligible(x), x.key + ' eligible before stage 24');
      G.level = 24;
      assert(apexEligible(x), x.key + ' not eligible with its full recipe at stage 24');
      G.path[x.paths[0]] = 2; // drop below nine ranks
      assert(!apexEligible(x), x.key + ' ignored the nine-rank floor');
      G.path[x.paths[0]] = 3;
      G.upg[WEB_APEXES.find(o => o.key !== x.key).key] = 1; // other apex owned
      assert(!apexEligible(x), x.key + ' ignored the 1-apex slot cap');
    }
    G.level = 1; G.starterLvl = 1; G.path = {}; G.upg = {};
    const reasons = webLockReason(WEB_FUSIONS[0], 'fusion');
    assert(reasons.length >= 3, 'a fully locked fusion should list its unmet requirements, got ' + reasons.length);
    return '15 fusions cover all pairs · 2 apexes gated · slot caps + lock reasons correct';
  });

  // 2w-i) OFFER ALGORITHM invariants: legal hands under fuzz, superskill
  // priority, post-evolution guarantee, reroll anti-repeat, satellites last.
  test('upgrade web: offer algorithm invariants', async () => {
    const e0 = ERR.length;
    SETTINGS.mode = 'junkie';
    resetRun(1, true);
    const freshWeb = form => {
      G.path = {}; G.upg = {}; G.webSeen = {}; G.lastOfferKeys = []; G.rerolled = false;
      G.starterLvl = form; G.lastDraftForm = form;
    };
    // fuzz 60 random builds — every dealt hand must be legal
    for (let iter = 0; iter < 60; iter++) {
      freshWeb(1 + Math.floor(Math.random() * 3));
      const n = Math.floor(Math.random() * 22);
      for (let i = 0; i < n; i++) {
        const opts = [
          ...PATH_KEYS.filter(k => pathLvl(k) < 4).map(k => () => advancePath(k)),
          ...WEB_BRIDGES.filter(bridgeEligible).map(b => () => { G.upg[b.key] = 1; }),
          ...WEB_FUSIONS.filter(fusionEligible).map(f => () => { G.upg[f.key] = 1; }),
          ...WEB_APEXES.filter(apexEligible).map(x => () => { G.upg[x.key] = 1; }),
        ];
        if (!opts.length) break;
        opts[Math.floor(Math.random() * opts.length)]();
      }
      G.lives = 1 + Math.floor(Math.random() * 4); G.livesMax = Math.max(G.lives, 4);
      rollUpgradeChoices();
      const cs = G.upgradeChoices || [];
      assert(cs.length === 3, 'iter ' + iter + ': hand size ' + cs.length);
      const authoredEligible = PATH_KEYS.filter(k => pathLvl(k) < 4).length +
        WEB_BRIDGES.filter(bridgeEligible).length + WEB_FUSIONS.filter(fusionEligible).length +
        WEB_APEXES.filter(apexEligible).length;
      for (const c of cs) {
        if (c.pathKey) {
          assert(pathLvl(c.pathKey) < 4 && c.tierIdx === pathLvl(c.pathKey),
            'iter ' + iter + ': illegal continuation ' + c.pathKey + '@' + c.tierIdx);
        } else if (c.web) {
          assert(c.webKind === 'apex' ? apexEligible(c.web)
            : c.webKind === 'fusion' ? fusionEligible(c.web) : bridgeEligible(c.web),
            'iter ' + iter + ': ineligible web node ' + c.web.key + ' offered');
        } else assert(c.stack, 'iter ' + iter + ': unknown choice shape');
      }
      { // the plan's one-per-hand rule: never two fusions/apexes together
        const bigs = cs.filter(c => c.web && (c.webKind === 'fusion' || c.webKind === 'apex')).length;
        assert(bigs <= 1, 'iter ' + iter + ': ' + bigs + ' fusions/apexes in one hand');
      }
      const pks = cs.filter(c => c.pathKey).map(c => c.pathKey);
      assert(new Set(pks).size === pks.length, 'iter ' + iter + ': duplicate path in hand');
      const nStacks = cs.filter(c => c.stack).length;
      assert(3 - nStacks === Math.min(3, authoredEligible),
        'iter ' + iter + ': a satellite crowded out an authored node (' + nStacks + ' stacks, ' + authoredEligible + ' eligible)');
    }
    // fusion priority: an eligible fusion always takes the Explore slot
    freshWeb(3);
    for (const pk of ['arsenal', 'impact']) while (pathLvl(pk) < 4) advancePath(pk);
    G.upg.calibrated = 1;
    rollUpgradeChoices();
    assert(G.upgradeChoices.some(c => c.web && c.web.key === 'meteor'),
      'an eligible fusion was not offered');
    // once TWO fusions are installed, no further fusion is ever dealt
    G.upg.meteor = 1; G.upg.prismstorm = 1;
    for (const pk of PATH_KEYS) while (pathLvl(pk) < 4) advancePath(pk);
    for (const b of WEB_BRIDGE_KEYS) G.upg[b] = 1;
    rollUpgradeChoices();
    assert(!G.upgradeChoices.some(c => c.web && c.webKind === 'fusion'),
      'a fusion was offered past the 2-slot cap');
    // post-evolution guarantee: reaching Form II surfaces a newly unlocked bridge
    freshWeb(1);
    advancePath('arsenal'); advancePath('impact');
    G.starterLvl = 2; // evolution happened since the last draft
    rollUpgradeChoices();
    assert(G.upgradeChoices.some(c => c.web && c.webKind === 'bridge'),
      'the first post-evolution draft did not surface a bridge');
    // reroll anti-repeat: a fresh-run reroll re-deals at most the one node the
    // offense/non-offense guard can force back
    freshWeb(1);
    rollUpgradeChoices();
    const first = (G.upgradeChoices || []).map(c => c.pathKey).filter(Boolean);
    G.rerolled = true;
    rollUpgradeChoices();
    const second = (G.upgradeChoices || []).map(c => c.pathKey).filter(Boolean);
    const overlap = first.filter(k => second.includes(k));
    assert(overlap.length <= 1, 'reroll re-dealt ' + overlap.length + ' of the rejected hand (' + overlap.join(',') + ')');
    // low health forces a legal rescue option
    freshWeb(1);
    G.lives = 1; G.livesMax = 5;
    rollUpgradeChoices();
    assert(G.upgradeChoices.some(c => c.path && ['defense', 'utility'].includes(c.path.family)),
      'low health did not force a defense/utility offer');
    // exhausted web: hand becomes exactly the three mastery satellites
    freshWeb(3);
    for (const pk of PATH_KEYS) while (pathLvl(pk) < 4) advancePath(pk);
    for (const k of WEB_BRIDGE_KEYS) G.upg[k] = 1;

    rollUpgradeChoices();
    assert(G.upgradeChoices.length === 3 && G.upgradeChoices.every(c => c.stack),
      'a completed web should offer the three satellites');
    assert(ERR.length === e0, 'errors during offer tests: ' + ERR.slice(e0).join(' | '));
    return '60 fuzzed hands legal · fusion priority + slot caps · evolution guarantee · reroll fresh · rescue forced · satellites last';
  });

    const legal = () => (webBuildLegal() ? null : 'recipe orphaned');
    assert(!legal(), 'the seeded build must start legal');
    // the apex is a leaf; the two fusions its recipe rides are NOT; the
    // shared capstone, the 3-rank floor and the bridge are all pinned
    const leaves0 = webRegressibleLeaves();

      'a bridge under an owned fusion was offered as a leaf');
    assert(!leaves0.some(l => l.kind === 'tier' && l.pathKey === 'arsenal'),
      'a 3-rank fusion floor was offered as a leaf');
    assert(!leaves0.some(l => l.kind === 'tier' && l.pathKey === 'impact'),
      "meteor + cataclysm's only capstone was offered as a leaf");
    let guard = 0;
    while (totalBuildLevels() > 0 && guard++ < 40) {
      G.lives = 1; G.state = 'play';
      loseLife('WEB REGRESSION TEST');
      const broken = legal();
      assert(!broken, 'knockout left an illegal build: ' + broken);
      if (G.state === 'gameover') break;
    }
    assert(totalBuildLevels() === 0 || G.state === 'gameover',
      'the web never burned down (left ' + totalBuildLevels() + ')');
    G.lives = 1; G.state = 'play';

    assert(G.state === 'gameover', 'empty web knockout should be a true game over');
    assert(ERR.length === e0, 'errors during web regression: ' + ERR.slice(e0).join(' | '));
    return 'rich build burned to 0 across ' + guard + ' knockouts — every intermediate state legal';
  });

  // 2w-iie) SEEDED ACQUISITION: the plan's structural pacing targets — a
  // focused route earns its fusion by Galar ≥80% of the time, caps hold,
  // and no apex ever lands before stage 24.
  test('upgrade web: seeded acquisition rates + caps', async () => {
    SETTINGS.mode = 'junkie'; SETTINGS.starter = 'none';
    resetRun(1, true);
    const runDraft = strategy => {
      G.path = {}; G.upg = {}; G.stacks = { orb: 0, ice: 0, bell: 0 };
      G.webSeen = {}; G.lastOfferKeys = []; G.rerolled = false;
      G.lives = 4; G.livesMax = 4;
      const out = { fusionAt: null, fusions: 0, apexAt: null };
      for (let lvl = 1; lvl <= 27; lvl++) {
        G.level = lvl + 1; // drafting happens after the clear, at the next stage's doorstep
        G.starterLvl = starterStage(G.level, null);
        rollUpgradeChoices();
        const cs = G.upgradeChoices || [];
        const pick = strategy(cs) || cs[0];
        if (!pick) break;
        if (pick.pathKey) advancePath(pick.pathKey);
        else if (pick.web) {
          G.upg[pick.web.key] = 1;
          if (pick.webKind === 'fusion') { out.fusions++; if (!out.fusionAt) out.fusionAt = G.level; }
          if (pick.webKind === 'apex') out.apexAt = G.level;
        } else if (pick.stack) G.stacks[pick.stack.key]++;
        G.lastDraftForm = webForm();
      }
      return out;
    };
    const focused = cs =>
      cs.find(c => c.web && c.webKind === 'apex')
      || cs.find(c => c.web && c.webKind === 'fusion')
      || cs.find(c => c.web && c.webKind === 'bridge' && c.web.key === 'calibrated')
      || cs.find(c => c.pathKey === 'arsenal') || cs.find(c => c.pathKey === 'impact')
      || cs.find(c => c.pathKey === 'surge') || cs.find(c => c.pathKey);
    const casual = cs => cs[Math.floor(Math.random() * cs.length)];
    let focusedHit = 0, focusedSum = 0, apexCount = 0, capViol = 0, earlyApex = 0;
    for (let i = 0; i < 40; i++) {
      const r = runDraft(focused);
      if (r.fusionAt) { focusedSum += r.fusionAt; if (r.fusionAt <= 24) focusedHit++; }
      if (r.fusions > 2) capViol++;
      if (r.apexAt) { apexCount++; if (r.apexAt < 24) earlyApex++; }
    }
    assert(capViol === 0, 'a run exceeded the 2-fusion cap');
    assert(earlyApex === 0, 'an apex landed before stage 24');
    assert(focusedHit >= 32, 'focused fusion-by-Galar rate ' + focusedHit + '/40 < 80%');
    // a full 27-pick journey usually completes SOME recipe eventually — the
    // pacing target is that unfocused discovery lands notably LATER than a
    // focused chase, and the 2-slot cap bounds everyone equally
    let casualHit = 0, casualSum = 0;
    for (let i = 0; i < 40; i++) {
      const r = runDraft(casual);
      if (r.fusions > 2) capViol++;
      if (r.fusionAt) { casualHit++; casualSum += r.fusionAt; }
    }
    assert(capViol === 0, 'a casual run exceeded the 2-fusion cap');
    assert(casualHit >= 8, 'unfocused runs never discover fusions: ' + casualHit + '/40');
    const focusedAvg = focusedSum / Math.max(1, focusedHit), casualAvg = casualSum / Math.max(1, casualHit);
    assert(casualAvg > focusedAvg + 0.5,
      'unfocused discovery should land later than a focused chase (focused ' +
      focusedAvg.toFixed(1) + ' vs casual ' + casualAvg.toFixed(1) + ')');
    assert(apexCount >= 1, 'a strongly focused route never completed an apex in 40 journeys');
    return 'focused fusion≤Galar ' + focusedHit + '/40 @~' + focusedAvg.toFixed(1) +
      ' · casual ' + casualHit + '/40 @~' + casualAvg.toFixed(1) + ' · apexes ' +
      apexCount + '/40 (never pre-24) · caps hold';
  });

  // 3) wall/flyer non-overlap — the core geometric invariant (classic)
  function overlapTest(lvl) {
    return async () => {
      const e0 = ERR.length;
      SETTINGS.mode = 'classic';
      resetRun(lvl, true);
      G.lives = 99;
      let overlaps = 0, maxFlyers = 0, framesSampled = 0;
      const samples = [];
      await runFrames(1800, f => {
        if (G.state === 'upgrade' || G.state === 'results' || G.state === 'gameover') return false; // wave over — enough sampled
        if (G.state === 'serve') fireAction(); // flyers only launch during play
        steerBallOrAim('classic');
        framesSampled = f + 1;
        const flyers = [], boxed = [];
        for (const br of G.bricks) {
          if (br.dead) continue;
          if (br.flight && br.flight.state >= 2 && !br.dive) flyers.push(br);
          else if (!bareMon(br) && !br.isBoss && !br.entry) boxed.push(br);
        }
        if (flyers.length > maxFlyers) maxFlyers = flyers.length;
        for (const a of flyers) {
          const ax = a.bx + G.fx, ay = a.by + G.fy;
          for (const b of boxed) {
            const bx = b.bx + G.fx, by = b.by + G.fy;
            if (Math.abs(ax - bx) < (a.w + b.w) / 2 && Math.abs(ay - by) < (a.h + b.h) / 2) {
              overlaps++;
              if (samples.length < 3) {
                samples.push('f' + f + ' ' + (NAMES[a.poke.id] || a.poke.id) + '(' + (ax | 0) + ',' + (ay | 0) +
                  ') vs ' + (NAMES[b.poke.id] || b.poke.id) + '(' + (bx | 0) + ',' + (by | 0) + ')');
              }
            }
          }
        }
      });
      assert(ERR.length === e0, 'errors during sim: ' + ERR.slice(e0).join(' | '));
      assert(overlaps === 0, overlaps + ' flyer↔wall overlaps, e.g. ' + samples.join(' ; '));
      assert(maxFlyers === 0, 'classic produced ' + maxFlyers + ' free flyers');
      return framesSampled + ' frames sampled, brick-only throughout, free flyers 0';
    };
  }
  for (const lvl of [5, 8, 14, 20, 26]) test('non-overlap: level ' + lvl, overlapTest(lvl));

  // 3b) flyer↔FLYER non-overlap — the separation solver runs in every mode now,
  // so flocks never bump each other into a blob (checked in blaster + junkie)
  function flyerFlyerTest(mode, lvl) {
    return async () => {
      const e0 = ERR.length;
      SETTINGS.mode = mode;
      resetRun(lvl, true);
      G.lives = 99;
      let overlaps = 0, maxFlyers = 0; const samples = [];
      await runFrames(1400, f => {
        if (G.state === 'upgrade' || G.state === 'results' || G.state === 'gameover') return false;
        if (G.state === 'serve') fireAction();
        steerBallOrAim(mode);
        const fl = G.bricks.filter(b => !b.dead && b.flight && b.flight.state >= 2 && !b.dive && !b.entry && !b.flight.entering);
        if (fl.length > maxFlyers) maxFlyers = fl.length;
        for (let i = 0; i < fl.length; i++) for (let j = i + 1; j < fl.length; j++) {
          const a = fl[i], b = fl[j];
          const minD = (Math.min(a.w, a.h) + Math.min(b.w, b.h)) * 0.5; // hard overlap only
          if (Math.hypot((a.bx + G.fx) - (b.bx + G.fx), (a.by + G.fy) - (b.by + G.fy)) < minD) {
            overlaps++;
            if (samples.length < 3) samples.push('f' + f + ' ' + (NAMES[a.poke.id] || a.poke.id) + ' vs ' + (NAMES[b.poke.id] || b.poke.id));
          }
        }
      });
      assert(ERR.length === e0, 'errors during sim: ' + ERR.slice(e0).join(' | '));
      // the solver keeps flocks from BLOBBING (a blob = hundreds/thousands of
      // overlap-frames over the run). A handful of single-frame transient
      // touches among fast-moving sprites is invisible and acceptable.
      assert(overlaps <= 6, mode + ' L' + lvl + ': ' + overlaps + ' flyer↔flyer overlap-frames (blob) — e.g. ' + samples.join(' ; '));
      return mode + ' L' + lvl + ' — peak flyers ' + maxFlyers + (maxFlyers < 2 ? ' (few flyers)' : '') + ', overlap-frames ' + overlaps + '/1400';
    };
  }

        for (let i = 0; i < 3; i++) rects['upgrade(' + i + ')'] = U.card(i);
        // constellation nodes may OVERFLOW small viewports by design (the
        // compact chart enforces a big minimum scale and pans instead) — the
        // guarantee is that the camera can bring every node inside the map box
        for (const zoom of [0.65, defaultTreeZoom(), 1.85]) {
          treeZoom = zoom; treePan.x = 0; treePan.y = 0;
          const TP = upgradeTreeLayout();
          const mcx = TP.map.x + TP.map.w / 2, mcy = TP.map.y + TP.map.h / 2;
          const reach = (name, n) => {
            if (Math.abs(n.cx - mcx) > TP.map.w / 2 + TP.panLim.x + 2 ||
                Math.abs(n.cy - mcy) > TP.map.h / 2 + TP.panLim.y + 2) {

            }
          };
          for (let pi = 0; pi < PATH_KEYS.length; pi++) {
            for (let ti = 0; ti < 4; ti++) reach('constellation(' + pi + ',' + ti + ')', TP.node(pi, ti));
          }
          for (let fi = 0; fi < WEB_FUSIONS.length; fi++) reach('fusion(' + fi + ')', TP.fusionNode(fi));
          for (let ai = 0; ai < WEB_APEXES.length; ai++) reach('apex(' + ai + ')', TP.apexNode(ai));
          for (let bi = 0; bi < WEB_BRIDGES.length; bi++) reach('bridge(' + bi + ')', TP.bridgeNode(bi));
          for (let si = 0; si < WEB_SATELLITES.length; si++) reach('satellite(' + si + ')', TP.satNode(si));
        }
        count = Object.keys(rects).length;
        for (const [name, r] of Object.entries(rects)) {
          if (!(r.x >= -2 && r.y >= -2 && r.x + r.w <= w + 2 && r.y + r.h <= h + 2)) {
            bad.push(w + '×' + h + ' ' + name + ' [' + (r.x | 0) + ',' + (r.y | 0) + ' ' + (r.w | 0) + '×' + (r.h | 0) + ']');

      W = w0; H = h0; setupStep = step0; treeZoom = zoom0;
      resize(); // belt and braces: recompute from the real viewport

  });

  // 7) storage corruption recovery — never destroys the real save (finally-restore)
  test('storage corruption recovery', async () => {
    const KEYS = ['pkbrk-settings', 'pkbrk-dex', 'pkbrk-dexs', 'pkbrk-music', 'pkbrk-best'];
    const FALLBACK = { 'pkbrk-settings': '{}', 'pkbrk-dex': '[]', 'pkbrk-dexs': '[]', 'pkbrk-music': 'true', 'pkbrk-best': '0' };
    const saved = {};
    for (const k of KEYS) saved[k] = localStorage.getItem(k);
    try {
      for (const k of KEYS) localStorage.setItem(k, '{corrupt');
      if (typeof loadStore !== 'function') {
        // no safe-load helper in the codebase yet: demonstrate raw JSON.parse recovery
        let threw = false;
        try { JSON.parse(localStorage.getItem('pkbrk-settings') || '{}'); } catch (e) { threw = true; }
        throw new Skip('no loadStore() helper exists yet (raw JSON.parse threw: ' + threw + ')');
      }
      const s = loadStore('pkbrk-settings', '{}');
      assert(s !== null && typeof s === 'object' && !Array.isArray(s),
        "loadStore('pkbrk-settings','{}') on corrupt data returned " + JSON.stringify(s) + ', expected an object');
      for (const k of KEYS) {
        localStorage.setItem(k, '{corrupt'); // loadStore may have cleaned it — re-corrupt each
        let v;
        try { v = loadStore(k, FALLBACK[k]); }
        catch (e) { assert(false, 'loadStore(' + k + ') threw on corrupt data: ' + e.message); }
        const want = JSON.parse(FALLBACK[k]);
        assert(typeof v === typeof want && Array.isArray(v) === Array.isArray(want),
          'loadStore(' + k + ') gave ' + JSON.stringify(v) + ', expected the ' + FALLBACK[k] + ' fallback shape');
      }
      return 'all 5 keys recover to their fallbacks without throwing';
    } finally {
      for (const k of KEYS) {
        if (saved[k] === null) localStorage.removeItem(k);
        else localStorage.setItem(k, saved[k]);
      }
    }
  });

  test('sentinel guard/opening rhythm', async () => {
    // ROUND D §1: round-1 sentinels GUARD (×0.55) until they commit to their
    // OWN special; that opens a 2.4s window on THAT sentinel — full damage,
    // first hit ×1.2 — while the other two stay guarded. The window decays back
    // to the guard, and the felled trio still WAKES the legendary (round 2).
    // Damage scaling is STRICTLY subBoss; the 18 boss/mythic duels prove it
    // never leaks onto legendaries/mythics.

      G.invuln = 999; G.lives = 99;

      if (G.gauntlet) G.gauntlet.entry = null;          // skip the PRISM DESCENT intro
      const subs = G.bricks.filter(b => b.subBoss && !b.dead);
      assert(subs.length === 3, 'round 1 must field three sentinels, got ' + subs.length);
      assert(subs.every(b => b.phaseCount === 1), 'sentinels must stay one-phase encounters');
      for (const b of subs) { b.hp = b.maxHp = 400; } // survive every measurement below
      const delta = (br, d) => { const h0 = br.hp; damageBrick(br, d, br.bx + G.fx, br.by + G.fy, null, {}); return h0 - br.hp; };
      const g = subs[0];
      // GUARDED: ×0.55
      g.openT = 0; g.openHit = false;
      assert(Math.abs(delta(g, 10) - 5.5) < 0.01, 'guarded sentinel did not take ×0.55');
      // OPENING: force its OWN special → guard drops on IT ONLY
      subAbility(g);
      assert(g.openT > 2 && g.openHit === false, 'subAbility did not open the sentinel guard window');
      assert((subs[1].openT || 0) <= 0 && (subs[2].openT || 0) <= 0, 'a sibling sentinel opened its guard too');
      // first hit in the window = ×1.2, subsequent = ×1.0
      assert(Math.abs(delta(g, 10) - 12) < 0.01, 'first OPENING hit was not ×1.2');
      assert(Math.abs(delta(g, 10) - 10) < 0.01, 'a later OPENING hit was not full ×1.0');
      // a still-guarded sibling stays ×0.55 during the window
      assert(Math.abs(delta(subs[1], 10) - 5.5) < 0.01, 'a sibling was not still guarded during the window');
      // EXPIRY: decay the window on the sentinel clock → guard restored (×0.55)
      G.state = 'play';
      for (let k = 0; k < 60 * 4 && g.openT > 0; k++) update(1 / 60);
      assert((g.openT || 0) <= 0, 'the OPENING window never expired');
      assert(Math.abs(delta(g, 10) - 5.5) < 0.01, 'the guard did not re-close after the window');
      // WAKE CHAIN: fell all three → the legendary wakes (round 2)
      for (const b of subs) b.dead = true;
      await runFrames(30);
      const boss = G.bricks.find(b => b.isBoss && !b.dead && !b.dormant);
      assert(boss && G.gauntlet.phase === 1, 'felling the sentinels did not wake the legendary (round 2)');
      return 'guarded ×0.55 · opening ×1.0 (first ×1.2) on the attacker only · window decays back to guard · 3 sentinels/phaseCount 1/wake chain intact';
    } finally { SETTINGS.mode = oldMode; SETTINGS.preset = oldPreset; }
  });

      G.lasers = []; G.chargeCD = 0; chargeHeld = true;
      await runFrames(90, () => G.charge < 1 ? undefined : false);
      await runFrames(40); // past the window
      const h1 = G.heat;
      chargeHeld = false; update(1 / 60);
      const plain = G.lasers.find(l => l.charged);
      assert(res.power > plain.power && res.pierce === plain.pierce + 1,
        'resonance did not boost power/pierce over a plain full release');
      assert(resHeat < (G.heat - h1) * 0.85, 'resonance did not run cooler');
      assert(statsCur().resonants === 1, 'plain release miscounted as resonant');
      // OVERCHARGE: sitting on a full charge heats faster than the barrel cools
      G.lasers = []; G.chargeCD = 0; chargeHeld = true;
      await runFrames(200, () => G.chargeFullT < 1.5 ? undefined : false);
      const h2 = G.heat;
      await runFrames(120); // 2s of overcharging
      assert(G.heat - h2 > 0.15, 'overcharge did not outpace passive cooling');
      chargeHeld = false; update(1 / 60);
      // HEAT FAIRNESS: sustained spam overheats in the honest band, and the
      // fire-rate path can only ever make that band KINDER, never crueller
      const timeToOverheat = async () => {
        paused = false; G.freeze = 0;
        const t0 = G.playT;
        let oh = false;
        await runFrames(60 * 18, () => {
          if (G.state === 'results') { G.stateT = 1; advanceResults(); return; }
          if (G.state === 'ceremony') { if (G.ceremony) G.ceremony.t = 99; advanceCeremony(); return; }
          if (G.state === 'upgrade') { G.stateT = 1; if (G.upgradeChoices) pickUpgrade(0); return; }
          if (G.state === 'play') fireAction(true);
          if (G.overheat > 0) { oh = true; return false; }
        });
        return oh ? G.playT - t0 : Infinity;
      };
      resetRun(1, true, { seed: 'heat-base' }); G.lives = 99;
      const base = await timeToOverheat();
      assert(base >= 5 && base <= 10.5, 'baseline sustained fire overheats outside the 5-10s band (' + base.toFixed(1) + 's)');
      resetRun(1, true, { seed: 'heat-up' }); G.lives = 99;
      devGrantBuild('arsenal:4');
      const upgraded = await timeToOverheat();
      assert(upgraded >= base - 0.5, 'fire-rate upgrades made overheating CRUELLER (' + upgraded.toFixed(1) + 's vs ' + base.toFixed(1) + 's)');
      return 'resonant +power/+pierce/−heat once; overcharge costs ~0.12/s; spam overheats in ' +
        base.toFixed(1) + 's base, ' + (upgraded === Infinity ? 'never' : upgraded.toFixed(1) + 's') + ' with full VOLLEY';
    } finally { SETTINGS.preset = oldPreset; SETTINGS.mode = 'classic'; chargeHeld = false; }
  });

  test('spectral veil: charge phases through, basic fire answers', async () => {
    const oldPreset = SETTINGS.preset;
    try {
      SETTINGS.mode = 'junkie'; SETTINGS.preset = 'normal';
      resetRun(7, true, { seed: 'veil-t' });
      paused = false; G.freeze = 0;
      const v = G.bricks.find(b => b.flight);
      v.specVeil = { ph: 0 };
      for (const b of G.bricks) if (b !== v) b.dead = true;
      G.reinforce = 0;
      v.specVeil.ph = 3.4 - (G.time % 3.4) + 0.1; // shimmer ACTIVE
      assert(specVeilActive(v), 'veil phase alignment failed');
      const hp0 = v.hp;
      G.lasers = [{ charged: true, basic: true, power: 3, pierce: 3, r: 12, x: v.bx + G.fx, y: v.by + G.fy + 8 }];
      update(1 / 60);
      assert(v.hp === hp0 && G.lasers.some(l => l.charged && !l.dead),
        'a charged bolt did not phase through the active veil');
      G.lasers = [{ basic: true, x: v.bx + G.fx, y: v.by + G.fy + 8 }];
      update(1 / 60);
      assert(v.hp < hp0 || v.dead, 'basic fire did not land on the veiled spirit');
      if (!v.dead) {
        v.specVeil.ph = 3.4 - (G.time % 3.4) + 2.5; // OPEN window
        assert(!specVeilActive(v), 'open-window phase alignment failed');
        const hp1 = v.hp;
        G.lasers = [{ charged: true, basic: true, power: 3, pierce: 3, r: 12, x: v.bx + G.fx, y: v.by + G.fy + 8 }];
        update(1 / 60);
        assert(v.hp < hp1 || v.dead, 'a charged bolt failed to land during the open window');
      }
      return 'shimmer: charge passes, basic lands; open window: charge lands — the anti-spam counterweight works';
    } finally { SETTINGS.preset = oldPreset; SETTINGS.mode = 'classic'; }
  });

  test('objective: escort the traveler (protect → disperse, faint → attrition)', async () => {
    const oldPreset = SETTINGS.preset;
    try {
      SETTINGS.mode = 'junkie'; SETTINGS.preset = 'normal';
      resetRun(10, true, { seed: 'obj-escort' }); // Sinnoh arrival
      paused = false; G.freeze = 0;
      assert(G.objective && G.objective.type === 'escort', 'Sinnoh arrival did not arm the escort objective');
      const fr = G.objective.friendly;
      assert(fr && fr.friendly && fr.poke.id === 175 && fr.fhp === 3 && fr.fpath === 'cross',
        'the escort friendly (Togepi 175, fhp 3, path cross) was not spawned');
      assert(!fr.flight, 'the friendly must have NO flight slot (outside the formation/solver systems)');
      // player fire PASSES THROUGH — no damage, the bolt survives, no lastHit
      G.enemyShots = [];
      const hp0 = fr.hp;
      G.lasers = [{ basic: true, x: fr.bx + G.fx, y: fr.by + G.fy }];
      update(1 / 60);
      assert(fr.hp === hp0 && !fr.dead && fr.fhp === 3, 'player fire damaged the friendly');
      assert(G.lasers.length && !G.lasers[0].dead && G.lasers[0].lastHit !== fr,
        'the bolt did not pass through the friendly (no survive / spent pierce on it)');
      // a forced enemy shot at its position chips a heart pip and is consumed
      const pip0 = fr.fhp;
      G.enemyShots = [{ x: fr.bx + G.fx, y: fr.by + G.fy, vx: 0, vy: 0, type: 'normal', classKey: 'micro', _t: 1 }];
      update(1 / 60);
      assert(fr.fhp === pip0 - 1, 'an enemy shot on the friendly did not chip its fhp');
      assert(!G.enemyShots.some(s => s._t), 'the enemy shot that struck the friendly was not consumed');
      // attrition can't clear while the traveler lives (survive-guard parity)
      let clearedEarly = false;
      await runFrames(60 * 2, () => {
        for (const b of G.bricks) if (!b.dead && !b.crosser && !b.barrier && !b.friendly) damageBrick(b, 9999, 0, 0, null, { ignorePhaseGate: true });
        if (G.state !== 'play') { clearedEarly = true; return false; }
      });
      assert(!clearedEarly && !G.objective.done, 'the escort wave cleared by attrition while the traveler lived');
      assert(G.objective.progress > 0, 'escort progress did not advance as the traveler climbed');
      // guarantee a swarm to disperse, then send the traveler to its exit
      spawnReinforcement();
      await runFrames(30);
      assert(G.bricks.some(b => b.flight && !b.dead), 'no swarm present to disperse');
      const fr2 = G.objective.friendly; fr2.by = fr2.fexitY - 1;
      const sc0 = G.score;
      update(1 / 60);
      assert(G.objective.done, 'the traveler reaching the exit did not complete the escort');
      assert(G.score - sc0 >= 600, 'escort completion did not pay the +600');
      assert(G.reinforce === 0 && G.bricks.some(b => b.crosser && !b.dead), 'the swarm did not disperse on escort completion');
      await runFrames(60 * 8, () => G.state === 'play' ? undefined : false);
      assert(G.state === 'results', 'completing the escort did not clear the stage');
      assert(G.results && G.results.objective === 'escort' && G.results.objectiveDone === true, 'ledger did not record the escort as complete');
      skipResults();
      // FRESH run: drain the friendly → objective FAILS, it faints, the wave
      // reverts to a normal attrition clear (the guard ignores failed objectives)
      resetRun(10, true, { seed: 'obj-escort-fail' });
      paused = false; G.freeze = 0;
      await runFrames(10); // prime past the serve→play transition before injecting
      const frF = G.objective.friendly; frF.fhp = 1;
      G.enemyShots = [{ x: frF.bx + G.fx, y: frF.by + G.fy, vx: 0, vy: 0, type: 'normal', classKey: 'micro' }];
      update(1 / 60); update(1 / 60);
      assert(G.objective.failed && frF.dead, 'draining the friendly did not FAIL the objective + faint it');
      await runFrames(60 * 8, () => {
        G.reinforce = 0;
        for (const b of G.bricks) if (!b.dead && !b.crosser && !b.friendly) damageBrick(b, 9999, 0, 0, null, { ignorePhaseGate: true });
        return G.state === 'play' ? undefined : false;
      });
      assert(G.state === 'results', 'a FAILED escort did not revert to a normal attrition clear');
      assert(G.results.objective === 'escort' && G.results.objectiveDone === false, 'ledger did not record the escort as failed');
      skipResults();
      return 'escort: pass-through fire, enemy chips fhp, protect-guard holds, exit → +600/disperse/clear; faint → fail → attrition';
    } finally { SETTINGS.preset = oldPreset; SETTINGS.mode = 'classic'; }
  });

  test('objective: defend the relay (hold the line)', async () => {
    const oldPreset = SETTINGS.preset;
    try {
      SETTINGS.mode = 'junkie'; SETTINGS.preset = 'normal';
      resetRun(17, true, { seed: 'obj-defend' }); // Kalos challenge
      paused = false; G.freeze = 0;
      assert(G.objective && G.objective.type === 'defend' && G.objective.dur > 0, 'Kalos challenge did not arm the defend objective');
      const fr = G.objective.friendly;
      assert(fr && fr.poke.id === 137 && fr.fpath === 'hold', 'the relay friendly (Porygon 137, path hold) was not spawned');
      fr.fhp = 30; // isolate the redirect + completion logic from incidental fire
      // the relay is STATIONARY — it parks near W/2 and barely drifts
      const x0 = fr.bx, y0 = fr.by;
      await runFrames(90);
      assert(Math.abs(fr.bx - x0) < 30 && Math.abs(fr.by - y0) < 30, 'the relay drifted from its hold station');
      // REDIRECT: while the relay lives, every 2nd AIMED MICRO volley aims at
      // the relay instead of the pilot. Put the pilot far left and the shooter
      // directly above the relay: pilot-aim → vx≪0, relay-aim → vx≈0 (down).
      G.paddle.x = 60;
      const rx = fr.bx + G.fx, src = { poke: { id: 19, t: 'normal' } };
      const micro = { classKey: 'micro', kind: 'shot', count: 1, spread: 0, aimed: true, speedMul: 0.7 };
      G.objective.redirN = 0;
      G.enemyShots = []; spawnStarEnemyPattern(src, micro, rx, 80, diff(), 1); // redirN 1 (odd → pilot)
      const v1 = G.enemyShots[G.enemyShots.length - 1];
      G.enemyShots = []; spawnStarEnemyPattern(src, micro, rx, 80, diff(), 2); // redirN 2 (even → relay)
      const v2 = G.enemyShots[G.enemyShots.length - 1];
      assert(v1.vx < -30, 'the non-redirected micro volley did not aim at the pilot');
      assert(Math.abs(v2.vx) < Math.abs(v1.vx) && v2.vy > 0, 'the alternating micro volley did not redirect its aim onto the relay');
      // HEAVY fire is NOT redirected — it keeps hunting the pilot even on the
      // alternating slot (micro class only)
      const heavy = { classKey: 'heavy', kind: 'shot', count: 1, spread: 0, aimed: true, speedMul: 0.7 };
      G.objective.redirN = 1; // next call is the even slot
      G.enemyShots = []; spawnStarEnemyPattern(src, heavy, rx, 80, diff(), 3);
      assert(G.enemyShots[G.enemyShots.length - 1].vx < -30, 'heavy fire was wrongly redirected to the relay');
      // TIMER completion → disperse + clear; ledger records objectiveDone
      spawnReinforcement();
      await runFrames(30);
      assert(G.bricks.some(b => b.flight && !b.dead), 'no swarm present to disperse');
      G.enemyShots = []; G.objective.friendly.fhp = 3;
      G.objective.t = G.objective.dur - 0.001;
      update(1 / 60);
      assert(G.objective.done, 'holding the relay for the timer did not complete the defend');
      assert(G.reinforce === 0 && G.bricks.some(b => b.crosser && !b.dead), 'the relay defense did not disperse the swarm');
      await runFrames(60 * 8, () => G.state === 'play' ? undefined : false);
      assert(G.state === 'results', 'completing the defend did not clear the stage');
      assert(G.results && G.results.objective === 'defend' && G.results.objectiveDone === true, 'ledger did not record objectiveDone for the defend');
      skipResults();
      return 'defend: stationary relay, alternating micro fire redirects onto it (heavy stays on the pilot), timer → disperse/clear/ledger';
    } finally { SETTINGS.preset = oldPreset; SETTINGS.mode = 'classic'; }
  });

  // ---- runner -------------------------------------------------------------
  async function main() {
    await tick();
    for (const t of TESTS) {
      const tr = addRow(t.name);
      const t0 = performance.now();
      let status = 'PASS', detail = '';
      try {
        detail = (await t.fn()) || '';
      } catch (e) {
        if (e instanceof Skip) { status = 'SKIP'; detail = e.message; }
        else { // keep the top of the stack — "undefined is not a function" alone is undebuggable
          status = 'FAIL';
          detail = (e.message || String(e)) +
            (e.stack ? ' @ ' + String(e.stack).split('\n').slice(1, 3).join(' <- ').replace(/https?:\/\/[^\s/]+/g, '') : '');
        }
      }
      const ms = performance.now() - t0;
      finishRow(tr, status, ms, detail);
      console.log('[TEST] ' + status + '  ' + t.name + '  (' + Math.round(ms) + 'ms)' + (detail ? '  — ' + detail : ''));
      RESULTS.push({ name: t.name, status, ms: Math.round(ms), detail });
      resetBetween();
      await tick();
    }
    const passed = RESULTS.filter(r => r.status === 'PASS').length;
    const failed = RESULTS.filter(r => r.status === 'FAIL').length;
    const skipped = RESULTS.filter(r => r.status === 'SKIP').length;
    const line = passed + '/' + RESULTS.length + ' PASSED' +
      (failed ? ' · ' + failed + ' FAILED' : '') + (skipped ? ' · ' + skipped + ' SKIPPED' : '');
    summaryEl.textContent = line;
    summaryEl.className = failed ? 'fail' : 'pass';
    console.log('[TEST SUITE] ' + line);
    window.TEST_RESULTS = RESULTS;
    window.TEST_DONE = true;
  }

  window.addEventListener('load', () => {
    // deterministic knobs regardless of whatever the player has saved locally —
    // in-memory only (saveSettings is never called), so the real save is untouched
    try {
      SETTINGS.drops = 1; SETTINGS.speed = 1; SETTINGS.preset = 'easy';
      SETTINGS.sfx = 0; SETTINGS.music = 0; SETTINGS.starter = 'none';
      SETTINGS.mode = 'classic'; SETTINGS.autoFire = false;
      if (typeof MUSIC !== 'undefined') MUSIC.on = false;
      ensureViewport();
    } catch (e) { ERR.push('settings normalization failed: ' + e.message); }
    summaryEl.textContent = 'running…';
    main().catch(e => {
      summaryEl.textContent = 'SUITE CRASHED: ' + (e.message || e);
      summaryEl.className = 'fail';
      window.TEST_RESULTS = RESULTS;
      window.TEST_DONE = true;
    });
  });
})();
</script>
